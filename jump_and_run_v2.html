<script>
(() => {
"use strict";
const cv = document.getElementById('c'), ctx = cv.getContext('2d', { alpha: false });
const W = 900, H = 600;
ctx.imageSmoothingEnabled = false;
cv.focus();

// ===== AUDIO =====
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, type='square', vol=0.08) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxJump(){ playTone(400,0.12,'sine',0.06); setTimeout(()=>playTone(600,0.08,'sine',0.04),50); }
function sfxCoin(){ playTone(880,0.06,'square',0.05); setTimeout(()=>playTone(1320,0.1,'square',0.04),60); }
function sfxStomp(){ playTone(200,0.15,'sawtooth',0.06); }
function sfxHit(){ playTone(120,0.3,'sawtooth',0.08); }
function sfxThunder(){ for(let i=0;i<4;i++) setTimeout(()=>playTone(80+Math.random()*200,0.08,'sawtooth',0.05),i*30); }
function sfxWave(){ playTone(300,0.2,'sine',0.04); setTimeout(()=>playTone(250,0.25,'sine',0.03),80); }
function sfxFire(){ playTone(200,0.2,'sawtooth',0.06); setTimeout(()=>playTone(150,0.15,'sawtooth',0.04),50); }
function sfxWater(){ playTone(400,0.15,'sine',0.05); setTimeout(()=>playTone(500,0.2,'sine',0.04),60); }
function sfxGuitar(){ playTone(82,0.08,'sawtooth',0.1); setTimeout(()=>playTone(110,0.08,'sawtooth',0.08),40); setTimeout(()=>playTone(147,0.12,'sawtooth',0.09),80); setTimeout(()=>playTone(196,0.15,'sawtooth',0.07),140); }
function sfxItem(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,'square',0.04),i*80)); }
function sfxWin(){ [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.2,'sine',0.05),i*120)); }
function sfxEvolve(){ [440,554,659,880,1047,1319].forEach((f,i)=>setTimeout(()=>playTone(f,0.25,'sine',0.06),i*150)); }
function sfxLevelUp(){ [659,784,880,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,'square',0.05),i*100)); }

// ===== CONSTANTS =====
const GRAVITY=0.65, JUMP_FORCE=-13.5, PLAYER_SPEED=5.2, ENEMY_SPEED=1;
const PW=40, PH=48, COIN_R=10;
const ATK_DUR=22, ATK_CD=36, ATK_W=PW*3.5, ATK_H=44;
const GROUND=H-50, STEP_H=52, STEP_W=260, CAM_LERP=0.08;

// ===== FORM DATA =====
const FORM_DATA = {
  sparky:    {name:'Sparky',    color:'#ffdc28', atk:'thunder', evolve:'voltail',    fly:0},
  voltail:   {name:'Voltail',   color:'#e8a020', atk:'thunder', evolve:null,         fly:0},
  foxy:      {name:'Foxy',      color:'#b47828', atk:'wave',    evolve:'aquafox',    fly:0},
  aquafox:   {name:'Aquafox',   color:'#3088d0', atk:'water',   evolve:null,         fly:0},
  egglet:    {name:'Egglet',    color:'#f0e8d0', atk:'wave',    evolve:'winglet',    fly:0},
  winglet:   {name:'Winglet',   color:'#f8d0d0', atk:'wave',    evolve:'skyguard',   fly:3},
  skyguard:  {name:'Skyguard',  color:'#e0e8ff', atk:'wave',    evolve:null,         fly:6},
  batling:   {name:'Batling',   color:'#7848a8', atk:'wave',    evolve:'fangwing',   fly:5},
  fangwing:  {name:'Fangwing',  color:'#6040a0', atk:'wave',    evolve:'shadowbat',  fly:7},
  shadowbat: {name:'Shadowbat', color:'#483098', atk:'wave',    evolve:null,         fly:10},
  flameling: {name:'Flameling', color:'#e06020', atk:'fire',    evolve:'blazeclaw',  fly:0},
  blazeclaw: {name:'Blazeclaw', color:'#d04020', atk:'fire',    evolve:'infernox',   fly:0},
  infernox:  {name:'Infernox',  color:'#c02010', atk:'fire',    evolve:null,         fly:4},
  shellbit:  {name:'Shellbit',  color:'#50a8e0', atk:'water',   evolve:'tideturtle', fly:0},
  tideturtle:{name:'Tideturtle',color:'#3888c0', atk:'water',   evolve:'torrentank', fly:0},
  torrentank:{name:'Torrentank',color:'#2060a0', atk:'water',   evolve:null,         fly:0},
  bigrest:   {name:'Bigrest',   color:'#2d5f6f', atk:'wave',    evolve:null,         fly:0},
};

// ===== POWER / ELEMENT STYLES =====
// Each element (form attack type) maps to an orb color + glyph for the per-level power item.
const POWER_STYLE = {
  thunder:{col:'#ffdc28', glow:'#fff6a0', letter:'T', label:'Thunder'},
  wave:   {col:'#80d0f0', glow:'#d0f0ff', letter:'W', label:'Wave'},
  water:  {col:'#3088d0', glow:'#a0d0f0', letter:'A', label:'Aqua'},
  fire:   {col:'#ff5020', glow:'#ffc060', letter:'F', label:'Fire'},
};

// ===== STAGES + LEVEL CONFIGS =====
// The game is split into themed main stages, each containing LEVELS_PER_STAGE
// levels. The flat LEVELS table is generated from the STAGES model so difficulty
// ramps smoothly across (and within) stages. Clearing a stage's last level
// unlocks the next stage in the stage-select screen.
/*__LEVELS_GEN_START__*/
const STAGES = [
  {name:'Sunny Meadows',     theme:'meadow',  boss:'bandit', hasWater:true,  hasLava:false},
  {name:'Whispering Forest', theme:'forest',  boss:'bandit', hasWater:true,  hasLava:false},
  {name:'Scorching Desert',  theme:'desert',  boss:'shadow', hasWater:true,  hasLava:false},
  {name:'Cloudtop Skies',    theme:'sky',     boss:'shadow', hasWater:false, hasLava:false},
  {name:'Murky Swamp',       theme:'swamp',   boss:'shadow', hasWater:true,  hasLava:false},
  {name:'Crystal Caverns',   theme:'cave',    boss:'shadow', hasWater:true,  hasLava:true },
  {name:'Ember Volcano',     theme:'volcano', boss:'shadow', hasWater:false, hasLava:true },
  {name:'Frostbite Glacier', theme:'ice',     boss:'shadow', hasWater:true,  hasLava:false},
  {name:'Tideheart Ocean',   theme:'ocean',   boss:'shadow', hasWater:true,  hasLava:true },
  {name:'Twilight Expanse',  theme:'twilight',boss:'shadow', hasWater:false, hasLava:true },
];
const LEVELS_PER_STAGE = 10;
// Dragon forms in evolution order; cycled across all levels since there are more
// levels than distinct forms.
const FORM_ORDER = ['sparky','voltail','foxy','aquafox','egglet','winglet','skyguard','batling',
  'fangwing','shadowbat','flameling','blazeclaw','infernox','shellbit','tideturtle','torrentank'];
// All known layout archetypes (the whitelist of structural templates a level may use).
const LAYOUT_ORDER = ['stairs','pits','islands','tower','gauntlet','river',
  'bridges','ascent','chasm','ruins','cascade','causeway',
  'pyramid','moat','mesa','spiral','stepstones','archipelago'];
// Per-stage layout sequences: each stage draws from its OWN curated mix and order
// of archetypes so no two stages feel structurally alike (instead of every stage
// cycling the same six shapes). Each row has LEVELS_PER_STAGE entries, every value
// is a member of LAYOUT_ORDER, and difficulty params still ramp globally by level.
const STAGE_LAYOUTS = [
  // 0 Sunny Meadows  (gentle intro: sprints, friendly hops, a first climb + a grand pyramid)
  ['causeway','stairs','islands','bridges','pyramid','pits','mesa','islands','causeway','stairs'],
  // 1 Whispering Forest (vertical: towers, ruined pillars, corkscrew climbs)
  ['stairs','tower','ruins','spiral','bridges','ascent','ruins','tower','spiral','ruins'],
  // 2 Scorching Desert (epic scale: long runs, great pyramids & mesas, wide stone crossings)
  ['causeway','pyramid','gauntlet','stepstones','ruins','mesa','gauntlet','pyramid','stepstones','causeway'],
  // 3 Cloudtop Skies (air & verticality; no water/lava -> void gaps, never river/moat/stepstones)
  ['islands','ascent','spiral','bridges','archipelago','cascade','tower','spiral','islands','chasm'],
  // 4 Murky Swamp (sunken crossings: bridges, stepping stones, moated keeps)
  ['bridges','moat','stepstones','river','bridges','moat','ruins','river','causeway','stepstones'],
  // 5 Crystal Caverns (descents, towers & corkscrews over lava/water chasms)
  ['cascade','tower','spiral','chasm','ascent','cascade','moat','ruins','chasm','spiral'],
  // 6 Ember Volcano (lava everywhere: chasms, gauntlets, stepping stones over magma)
  ['chasm','stepstones','gauntlet','river','chasm','mesa','stepstones','gauntlet','chasm','river'],
  // 7 Frostbite Glacier (slippery descents, island hops, icy pyramids & spires)
  ['cascade','islands','bridges','pyramid','cascade','archipelago','islands','spiral','cascade','pyramid'],
  // 8 Tideheart Ocean (water crossings everywhere: archipelagos, ferries, cascades)
  ['river','archipelago','chasm','islands','stepstones','river','archipelago','chasm','cascade','archipelago'],
  // 9 Twilight Expanse (finale: the hardest mix of every shape in the game)
  ['gauntlet','spiral','chasm','moat','ruins','mesa','stepstones','chasm','ascent','pyramid'],
];
function buildLevels(){
  const out=[];
  const total=STAGES.length*LEVELS_PER_STAGE;
  const last=Math.max(1,total-1);
  for(let s=0;s<STAGES.length;s++){
    const st=STAGES[s];
    for(let k=0;k<LEVELS_PER_STAGE;k++){
      const g=s*LEVELS_PER_STAGE+k; // global 0-based level index
      out.push({
        form:FORM_ORDER[g%FORM_ORDER.length],
        theme:st.theme,
        enemies:6+Math.floor(g*16/last),        // 6 -> ~22
        bossHp:3+Math.floor(g*9/last),           // 3 -> 12
        eSpd:Math.round((1.0+g/last)*100)/100, // 1.0 -> ~2.0
        steps:4+Math.floor(g/16),                // 4 -> ~10
        hasWater:st.hasWater,
        hasLava:st.hasLava,
        boss:st.boss,
        layout:STAGE_LAYOUTS[s][k],
        stage:s,
      });
    }
  }
  return out;
}
const LEVELS = buildLevels();
/*__LEVELS_GEN_END__*/

// ===== STATS =====
const stats = {
  startTime:0, endTime:0, score:0, won:false, livesLeft:0,
  deaths:0, coinsCollected:0, enemiesStomped:0, enemiesZapped:0,
  attacks:0, jumps:0, formsCollected:[], finalForm:'sparky',
  maxXReached:0, waterDeaths:0, fallDeaths:0, enemyDeaths:0,
  lavaDeaths:0, bossesKilled:0, levelReached:1,
  reset(){
    this.startTime=Date.now(); this.endTime=0; this.score=0; this.won=false;
    this.livesLeft=3; this.deaths=0; this.coinsCollected=0;
    this.enemiesStomped=0; this.enemiesZapped=0; this.attacks=0; this.jumps=0;
    this.formsCollected=[]; this.finalForm='sparky';
    this.maxXReached=0; this.waterDeaths=0; this.fallDeaths=0; this.enemyDeaths=0;
    this.lavaDeaths=0; this.bossesKilled=0; this.levelReached=1;
  },
  finalize(p,w){
    this.endTime=Date.now(); this.score=p.score; this.won=w;
    this.livesLeft=p.lives; this.finalForm=p.form; this.levelReached=currentLevel;
  },
  toJSON(){
    return {
      player_name:playerName||'Player',
      timestamp:new Date(this.startTime).toISOString(),
      duration_seconds:Math.round((this.endTime-this.startTime)/1000*10)/10,
      score:this.score, won:this.won, lives_left:this.livesLeft,
      deaths_total:this.deaths, deaths_enemy:this.enemyDeaths,
      deaths_water:this.waterDeaths, deaths_fall:this.fallDeaths,
      deaths_lava:this.lavaDeaths, coins_collected:this.coinsCollected,
      enemies_stomped:this.enemiesStomped, enemies_zapped:this.enemiesZapped,
      bosses_killed:this.bossesKilled, attacks_used:this.attacks, jumps:this.jumps,
      forms_collected:this.formsCollected.join(','), final_form:this.finalForm,
      max_x_reached:Math.round(this.maxXReached), level_reached:this.levelReached
    };
  },
  publish(){
    const data=this.toJSON();
    const el=document.getElementById('gameStats');
    if(el){el.textContent=JSON.stringify(data);el.style.display='block';}
    // Bridge stats to the Rayfin host app (when embedded in an <iframe>).
    try{ if(window.parent && window.parent!==window){ window.parent.postMessage({type:'rayfin-game-stats',payload:data},'*'); } }catch(_){/* cross-origin guard */}
  }
};

// ===== INPUT =====
const keys={};
let atkQueued=false, guitarAtkQueued=false, anyKey=false, playerName='';
let unlockedForms=['sparky','bigrest'];
const nameInput=document.getElementById('playerNameInput');
const nameContainer=document.getElementById('nameContainer');
// ===== CHEAT CODES =====
// Typed words (no Enter needed):
//   "leben"   -> restore all lives (Leben = lives)
//   "power"   -> toggle invincibility (godmode); the level stays finishable either way
//   "blitz"   -> switch to the Thunder power form
//   "feuer"   -> switch to the Fire power form
//   "wasser"  -> switch to the Water power form
//   "welle"   -> switch to the Wave power form
//   "fliegen" -> switch to a flying form with full flight charges
// "L" + number -> jump to that level (L9 = level 9).
const LEVEL_JUMP_TIMEOUT_MS=500; // commit a single-digit level jump this long after the digit is typed
let cheatBuf='', lvlJumpBuf='', lvlJumpTimer=0, cheatMsg='', cheatMsgT=0;
function flashCheat(msg){cheatMsg=msg;cheatMsgT=150;}
// Switch the player to the first form whose attack matches the given element, and top up its flight charges.
function setPowerForm(element){
  if(!player)return;
  const key=FORM_ORDER.find(f=>(FORM_DATA[f]||{}).atk===element);
  if(!key)return;
  player.form=key;
  if(!unlockedForms.includes(key))unlockedForms.push(key);
  const fd=FORM_DATA[key]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;
  sfxItem();
}
// Switch the player to a flying form with full flight charges.
function setFlyPower(){
  if(!player)return;
  const key='skyguard';
  player.form=key;
  if(!unlockedForms.includes(key))unlockedForms.push(key);
  const fd=FORM_DATA[key]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;
  sfxItem();
}
function commitLevelJump(){
  if(lvlJumpBuf){const n=parseInt(lvlJumpBuf,10);
    if(n>=1&&n<=LEVELS.length&&player){currentLevel=n;stats.levelReached=Math.max(stats.levelReached,n);
      player.form=LEVELS[n-1].form;if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
      const sc=player.score,lv=player.lives;loadLevel();player.score=sc;player.lives=lv;
      flashCheat('CHEAT: Level '+n);}}
  lvlJumpBuf='';lvlJumpTimer=0;
}
function handleCheatKey(e){
  if(state!=='playing')return;
  // Level jump: press L, then type a number (e.g. L9 or L12), committed shortly after.
  // NB: don't return on KeyL — the 'l' must still feed cheatBuf so "leben" can match.
  if(e.code==='KeyL'){lvlJumpBuf='';lvlJumpTimer=performance.now();}
  else if(lvlJumpTimer&&/^[0-9]$/.test(e.key)){lvlJumpBuf+=e.key;lvlJumpTimer=performance.now();
    if(lvlJumpBuf.length>=2)commitLevelJump();return;}
  // Cheats: typed words. Buffer keeps the last 8 letters; matches use endsWith so
  // longer words (wasser, fliegen) work. None of the words is a suffix of another.
  if(/^[a-zA-Z]$/.test(e.key)){cheatBuf=(cheatBuf+e.key.toLowerCase()).slice(-8);
    if(!player)return;
    if(cheatBuf.endsWith('leben')){player.lives=player.maxLives;cheatBuf='';
      flashCheat('CHEAT: Lives restored');}
    else if(cheatBuf.endsWith('power')){player.godmode=!player.godmode;cheatBuf='';
      flashCheat(player.godmode?'CHEAT: Invincible ON':'CHEAT: Invincible OFF');}
    else if(cheatBuf.endsWith('blitz')){setPowerForm('thunder');cheatBuf='';flashCheat('CHEAT: Thunder power');}
    else if(cheatBuf.endsWith('feuer')){setPowerForm('fire');cheatBuf='';flashCheat('CHEAT: Fire power');}
    else if(cheatBuf.endsWith('wasser')){setPowerForm('water');cheatBuf='';flashCheat('CHEAT: Water power');}
    else if(cheatBuf.endsWith('welle')){setPowerForm('wave');cheatBuf='';flashCheat('CHEAT: Wave power');}
    else if(cheatBuf.endsWith('fliegen')){setFlyPower();cheatBuf='';flashCheat('CHEAT: Flight power');}}
}
cv.addEventListener('keydown',e=>{keys[e.code]=true; if(e.code==='KeyF')atkQueued=true; if(e.code==='KeyG')guitarAtkQueued=true; anyKey=true; handleCheatKey(e); e.preventDefault();});
cv.addEventListener('keyup',e=>{keys[e.code]=false; e.preventDefault();});
cv.addEventListener('click',()=>{cv.focus();initAudio();anyKey=true;});
// Map a pointer event to canvas (900x600) coordinates, accounting for CSS scaling.
function canvasPos(clientX,clientY){const r=cv.getBoundingClientRect();return{x:(clientX-r.left)/r.width*W,y:(clientY-r.top)/r.height*H};}
cv.addEventListener('pointerdown',e=>{if(state==='stageselect'){const p=canvasPos(e.clientX,e.clientY);pickStageAt(p.x,p.y);}});
nameInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault(); playerName=nameInput.value.trim()||'Player';
    nameContainer.style.display='none'; cv.style.display='block'; cv.focus(); anyKey=true;
  }
});
// ===== TOUCH CONTROLS (mobile, landscape) =====
if('ontouchstart' in window || navigator.maxTouchPoints>0){
  document.body.classList.add('touch');
  const touchBtns=document.querySelectorAll('#touch .tbtn');
  touchBtns.forEach(btn=>{
    const code=btn.dataset.k, act=btn.dataset.act;
    const press=e=>{e.preventDefault();initAudio();anyKey=true;
      if(code)keys[code]=true;
      if(act==='F')atkQueued=true;
      if(act==='G')guitarAtkQueued=true;};
    const release=e=>{e.preventDefault();if(code)keys[code]=false;};
    btn.addEventListener('touchstart',press,{passive:false});
    btn.addEventListener('touchend',release,{passive:false});
    btn.addEventListener('touchcancel',release,{passive:false});
  });
}
cv.focus();

// ===== HELPERS =====
const {sin,cos,PI,floor,round,abs,max,min,sqrt,random,atan2}=Math;
const TAU=PI*2;
const rnd=(a,b)=>floor(random()*(b-a+1))+a;
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>max(lo,min(hi,v));

class Rect {
  constructor(x,y,w,h){this.x=x;this.y=y;this.w=w;this.h=h;}
  get l(){return this.x;} get r(){return this.x+this.w;} get t(){return this.y;} get b(){return this.y+this.h;}
  get cx(){return this.x+this.w/2;} get cy(){return this.y+this.h/2;}
  set l(v){this.x=v;} set r(v){this.x=v-this.w;} set t(v){this.y=v;} set b(v){this.y=v-this.h;}
  hit(o){return this.x<o.x+o.w&&this.x+this.w>o.x&&this.y<o.y+o.h&&this.y+this.h>o.y;}
}

const particles=[];
class Particle {
  constructor(x,y,vx,vy,life,r,col,grav=0,shrink=true){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.life=life;this.maxLife=life;this.r=r;this.col=col;
    this.grav=grav;this.shrink=shrink;this.dead=false;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.life--;if(this.life<=0)this.dead=true;}
  draw(cam){
    const a=this.life/this.maxLife,r=this.shrink?this.r*a:this.r;
    ctx.globalAlpha=a*0.8;ctx.fillStyle=this.col;
    ctx.beginPath();ctx.arc(this.x-cam,this.y,max(r,0.5),0,TAU);ctx.fill();ctx.globalAlpha=1;
  }
}
function emit(x,y,count,spread,speed,life,r,col,grav=0){
  for(let i=0;i<count;i++){
    const a=random()*TAU,s=random()*speed;
    particles.push(new Particle(x,y,cos(a)*s*spread,sin(a)*s-random()*speed*0.5,life+rnd(-5,5),r+random()*r*0.5,col,grav));
  }
}

let shakeX=0,shakeY=0,shakeT=0;

// ===== DRAW PRIMITIVES =====
function radGrad(x,y,r1,r2,c1,c2){const g=ctx.createRadialGradient(x,y,r1,x,y,r2);g.addColorStop(0,c1);g.addColorStop(1,c2);return g;}
function linGrad(x1,y1,x2,y2,stops){const g=ctx.createLinearGradient(x1,y1,x2,y2);for(const[s,c]of stops)g.addColorStop(s,c);return g;}
function fRect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x,y,w,h);}
function fRRect(x,y,w,h,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();}
function fEll(x,y,w,h,c){ctx.fillStyle=c;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,max(w/2,0.1),max(h/2,0.1),0,0,TAU);ctx.fill();}
function sEll(x,y,w,h,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.ellipse(x+w/2,y+h/2,max(w/2,0.1),max(h/2,0.1),0,0,TAU);ctx.stroke();}
function fCir(px,py,r,c){ctx.fillStyle=c;ctx.beginPath();ctx.arc(px,py,max(r,0.1),0,TAU);ctx.fill();}
function sCir(px,py,r,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.arc(px,py,max(r,0.1),0,TAU);ctx.stroke();}
function fPoly(pts,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.fill();}
function dLine(x1,y1,x2,y2,c,lw=1){ctx.strokeStyle=c;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
function drawShadow(x,y,w,h){ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x+w/2,y+h,w/2+4,6,0,0,TAU);ctx.fill();ctx.restore();}
function dText(text,size,x,y,col,center=false,shadow=false,bold=false){
  ctx.font=(bold?'bold ':'')+size+'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign=center?'center':'left';ctx.textBaseline=center?'middle':'top';
  if(shadow){ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(text,x+2,y+2);}
  ctx.fillStyle=col;ctx.fillText(text,x,y);
}

// ===== PLAYER =====
class Player {
  constructor(x,y){
    this.rect=new Rect(x,y,PW,PH);this.vy=0;this.onGround=false;
    this.lives=3;this.maxLives=3;this.score=0;
    this.facingRight=true;this.form='sparky';
    this.atkTimer=0;this.atkCd=0;this.atkRect=null;
    this.guitarAtkTimer=0;this.guitarAtkCd=0;this.guitarAtkRect=null;
    this.runFrame=0;this.invincible=0;this.dustTimer=0;
    this.flyCharges=0;this.maxFlyCharges=0;
    this.godmode=false;
  }
  update(plats){
    let dx=0;
    if(keys.ArrowLeft||keys.KeyA){dx=-PLAYER_SPEED;this.facingRight=false;}
    if(keys.ArrowRight||keys.KeyD){dx=PLAYER_SPEED;this.facingRight=true;}
    if((keys.Space||keys.ArrowUp||keys.KeyW)&&this.onGround){
      this.vy=JUMP_FORCE;this.onGround=false;sfxJump();stats.jumps++;
      emit(this.rect.cx,this.rect.b,5,0.8,2,15,3,'rgba(255,255,255,0.6)',0.05);
    }
    const fd=FORM_DATA[this.form];
    if(keys.KeyX&&fd&&fd.fly>0&&this.flyCharges>0){
      this.vy=JUMP_FORCE*0.7;this.flyCharges--;this.onGround=false;keys.KeyX=false;
      playTone(500+(this.maxFlyCharges-this.flyCharges)*60,0.08,'sine',0.04);
      emit(this.rect.cx,this.rect.b,4,1,1.5,12,2,'rgba(160,100,220,0.6)',0.03);
    }
    if(this.onGround){this.maxFlyCharges=fd?fd.fly:0;this.flyCharges=this.maxFlyCharges;}
    this.vy+=GRAVITY;
    this.rect.x+=dx;this._cx(dx,plats);
    this.rect.y+=floor(this.vy);this._cy(plats);
    if(this.atkCd>0)this.atkCd--;
    if(this.atkTimer>0){this.atkTimer--;
      this.atkRect=this.facingRight?new Rect(this.rect.r,this.rect.cy-ATK_H/2,ATK_W,ATK_H)
        :new Rect(this.rect.l-ATK_W,this.rect.cy-ATK_H/2,ATK_W,ATK_H);
    }else this.atkRect=null;
    if(this.guitarAtkCd>0)this.guitarAtkCd--;
    if(this.guitarAtkTimer>0){this.guitarAtkTimer--;
      const gw=ATK_W*1.5,gh=ATK_H*1.3;
      this.guitarAtkRect=this.facingRight?new Rect(this.rect.r,this.rect.cy-gh/2,gw,gh)
        :new Rect(this.rect.l-gw,this.rect.cy-gh/2,gw,gh);
    }else this.guitarAtkRect=null;
    if(this.invincible>0)this.invincible--;
    if(dx!==0)this.runFrame+=0.25;else this.runFrame=0;
    if(abs(dx)>0&&this.onGround){this.dustTimer++;
      if(this.dustTimer%5===0)emit(this.rect.cx-(this.facingRight?8:-8),this.rect.b-2,1,0.5,1,12,2,'rgba(180,160,120,0.5)',-0.02);
    }else this.dustTimer=0;
  }
  attack(){
    if(this.atkCd>0||this.atkTimer>0)return;
    this.atkTimer=ATK_DUR;this.atkCd=ATK_CD;stats.attacks++;
    const a=(FORM_DATA[this.form]||{}).atk||'wave';
    if(a==='thunder')sfxThunder();else if(a==='fire')sfxFire();else if(a==='water')sfxWater();else sfxWave();
  }
  guitarAttack(){
    if(this.guitarAtkCd>0||this.guitarAtkTimer>0)return;
    this.guitarAtkTimer=28;this.guitarAtkCd=45;stats.attacks++;
    sfxGuitar();
  }
  _cx(dx,ps){for(const p of ps)if(this.rect.hit(p)){if(dx>0)this.rect.r=p.l;else if(dx<0)this.rect.l=p.r;}}
  _cy(ps){this.onGround=false;for(const p of ps)if(this.rect.hit(p)){if(this.vy>0){this.rect.b=p.t;this.vy=0;this.onGround=true;}else if(this.vy<0){this.rect.t=p.b;this.vy=0;}}}

  draw(cam,tick){
    if(this.invincible>0&&floor(this.invincible/3)%2===0)return;
    const x=this.rect.x-cam,y=this.rect.y;
    drawShadow(x,y,PW,PH);
    ctx.save();ctx.translate(x+PW/2,y+PH);ctx.scale(this.facingRight?1:-1,1);ctx.translate(-PW/2,-PH);
    switch(this.form){
      case'sparky':this._dSparky(tick);break;case'voltail':this._dVoltail(tick);break;
      case'foxy':this._dFoxy(tick);break;case'aquafox':this._dAquafox(tick);break;
      case'egglet':this._dEgglet(tick);break;case'winglet':this._dWinglet(tick);break;
      case'skyguard':this._dSkyguard(tick);break;
      case'batling':this._dBatling(tick);break;case'fangwing':this._dFangwing(tick);break;
      case'shadowbat':this._dShadowbat(tick);break;
      case'flameling':this._dFlameling(tick);break;case'blazeclaw':this._dBlazeclaw(tick);break;
      case'infernox':this._dInfernox(tick);break;
      case'shellbit':this._dShellbit(tick);break;case'tideturtle':this._dTideturtle(tick);break;
      case'torrentank':this._dTorrentank(tick);break;
      case'bigrest':this._dBigrest(tick);break;
      default:this._dSparky(tick);
    }
    ctx.restore();
    if(this.atkTimer>0&&this.atkRect){
      const a=(FORM_DATA[this.form]||{}).atk||'wave';
      if(a==='thunder')this._drawThunder(cam,tick);
      else if(a==='fire')this._drawFire(cam,tick);
      else if(a==='water')this._drawWaterAtk(cam,tick);
      else this._drawWave(cam,tick);
    }
    if(this.guitarAtkTimer>0&&this.guitarAtkRect)this._drawGuitar(cam,tick);
  }

  // ===== ATTACK: ELECTRIC GUITAR (for bosses) =====
  _drawGuitar(cam,tick){
    const prog=1-this.guitarAtkTimer/28,swing=sin(prog*PI)*30;
    const gx=this.guitarAtkRect.x-cam+(this.facingRight?20:-20),gy=this.guitarAtkRect.cy-20;
    ctx.save();
    ctx.translate(gx,gy);
    ctx.rotate((this.facingRight?1:-1)*(swing*PI/180));
    // Guitar body (V-shape)
    ctx.fillStyle=linGrad(-15,-10,15,10,[[0,'#1a1a2e'],[0.5,'#2a2a3e'],[1,'#1a1a2e']]);
    ctx.beginPath();
    ctx.moveTo(0,-18);ctx.lineTo(-12,0);ctx.lineTo(-10,8);ctx.lineTo(10,8);ctx.lineTo(12,0);ctx.closePath();
    ctx.fill();
    // Pickups
    fRect(-6,-2,3,6,'#c0c0c0');fRect(3,-2,3,6,'#c0c0c0');
    // Strings
    for(let i=0;i<6;i++){const sy=-12+i*4;
      dLine(-10,sy,10,sy,'rgba(200,200,200,0.6)',0.5);}
    // Neck
    fRect(-2,-18,4,10,'#5a4030');
    // Headstock
    fRect(-4,-24,8,6,linGrad(-4,-24,4,-18,[[0,'#3a2820'],[1,'#5a4030']]));
    // Tuning pegs
    for(let i=0;i<3;i++){fCir(-3,-22+i*2,1,'#808080');fCir(3,-22+i*2,1,'#808080');}
    // Lightning/energy effect
    ctx.globalAlpha=0.7*(1-prog);
    for(let i=0;i<8;i++){
      const ex=random()*24-12,ey=random()*16-8;
      fCir(ex,ey,2+random()*3,'#ffff00');
    }
    // Sound waves
    ctx.strokeStyle='rgba(255,200,0,'+((1-prog)*0.5)+')';
    ctx.lineWidth=2;
    for(let r=10;r<40;r+=10){

  // ===== ATTACK: THUNDER =====
  _drawThunder(cam,tick){

    ctx.save();ctx.globalAlpha=0.15*(1-prog);fRect(ax,ay,ATK_W,ATK_H,'#ffff40');ctx.restore();
    for(let i=0;i<6;i++){let bx=ax+i*(ATK_W/6),by=ay+random()*ATK_H;const pts=[[bx,by]];
      for(let j=0;j<4;j++){bx+=(6+random()*14)*f;by+=-10+random()*20;pts.push([bx,by]);}

      for(let k=1;k<pts.length;k++)ctx.lineTo(pts[k][0],pts[k][1]);ctx.stroke();

      for(let k=1;k<pts.length;k++)ctx.lineTo(pts[k][0],pts[k][1]);ctx.stroke();}

  // ===== ATTACK: WAVE (sonic rings) =====
  _drawWave(cam,tick){

    const ox=this.rect.cx-cam+f*10,oy=this.rect.cy;

  }

  // ===== ATTACK: FIRE (burst) =====
  _drawFire(cam,tick){
    const f=this.facingRight?1:-1,prog=1-this.atkTimer/ATK_DUR;
    const ox=this.rect.cx-cam+f*30,oy=this.rect.cy;
    ctx.save();ctx.globalAlpha=0.2*(1-prog);fCir(ox+f*prog*60,oy,20+prog*30,'#ff4010');ctx.restore();

  }

  // ===== ATTACK: WATER (stream) =====
  _drawWaterAtk(cam,tick){
    const f=this.facingRight?1:-1,prog=1-this.atkTimer/ATK_DUR;
    const ox=this.rect.cx-cam+f*20,oy=this.rect.cy;

  }
}

// ===== LEVEL GENERATOR =====
let currentLevel=1, boss=null, lavaZones=[];

// A dragon placed far off-screen for layouts that don't use a moving platform.
function offDragon(){return new Dragon(-3000,GROUND+600,-3000,-3000,0);}

// Adds a hazard pit (lava/water/void depending on cfg) at S.x, with optional
// floating stepping platforms, then advances the cursor past it.
function hazardPit(S,gw,floaters){
  if(S.cfg.hasLava)S.lavaArr.push(new Lava(S.x,gw,GROUND));
  else if(S.cfg.hasWater)S.waterZones.push(new Water(S.x,gw,GROUND));
  if(floaters)for(const f of floaters)S.plats.push(new Rect(S.x+f.dx,GROUND-f.dy,f.w,15));
  S.x+=gw;
}

// --- Layout archetypes: each builds platforms/hazards onto S and returns a dragon ---
function layoutStairs(S){
  const{lvlIdx,cfg}=S;const sw=max(200,STEP_W-(lvlIdx>8?lvlIdx*3:0));
  // Opening hazard pit: scale the number of stepping floaters with its width so
  // each hop stays within jump reach (~165px) even on the widest late-game pits.
  const gw=100+lvlIdx*8;const segs=((gw/165)|0)+1;const fl=[];
  for(let i=1;i<segs;i++)fl.push({dx:i*gw/segs-40,dy:i%2?60:92,w:80});
  hazardPit(S,gw,fl);
  const midW=max(200,300-lvlIdx*5);S.plats.push(new Rect(S.x,GROUND,midW,50));S.x+=midW;
  const nSteps=cfg.steps;
  for(let i=0;i<nSteps;i++)S.plats.push(new Rect(S.x+i*sw,GROUND-(i+1)*STEP_H,sw,(i+1)*STEP_H+50));
  const sY=GROUND-(nSteps+1)*STEP_H,sLX=S.x+nSteps*sw,sH=(nSteps+1)*STEP_H+50,sGW=350+lvlIdx*15;
  S.plats.push(new Rect(sLX,sY,250,sH));
  const sRX=sLX+250+sGW;S.plats.push(new Rect(sRX,sY,250,sH));
  const dragon=new Dragon(sLX+250+50,sY+22,sLX+250,sRX,1.5+lvlIdx*0.05);
  const dSX=sRX+250;
  for(let i=0;i<nSteps;i++)S.plats.push(new Rect(dSX+i*sw,GROUND-(nSteps-i)*STEP_H,sw,(nSteps-i)*STEP_H+50));
  S.x=dSX+nSteps*sw;S.plats.push(new Rect(S.x,GROUND,220,50));S.x+=220;
  return dragon;
}
function layoutPits(S){
  const{lvlIdx}=S;const segs=4+(lvlIdx>8?2:0);
  for(let i=0;i<segs;i++){
    const segW=210+rnd(0,70);S.plats.push(new Rect(S.x,GROUND,segW,50));
    if(i%2===1)S.plats.push(new Rect(S.x+segW/2-40,GROUND-95,80,15));
    S.x+=segW;
    if(i<segs-1){const gw=110+lvlIdx*4;hazardPit(S,gw,[{dx:gw/2-45,dy:72,w:90}]);}
  }
  return offDragon();
}
function layoutIslands(S){
  const{lvlIdx}=S;const n=6+(lvlIdx>6?2:0);let y=GROUND;
  for(let i=0;i<n;i++){
    const w=120+rnd(0,50);S.plats.push(new Rect(S.x,y,w,18));
    S.x+=w+(105+rnd(0,35));
    y=clamp(GROUND-rnd(0,2)*50,GROUND-100,GROUND);
  }
  S.plats.push(new Rect(S.x,GROUND,200,50));S.x+=200;
  return offDragon();
}
function layoutTower(S){
  const{lvlIdx}=S;const baseX=S.x;S.plats.push(new Rect(S.x,GROUND,180,50));
  let px=baseX+30,py=GROUND-70,dir=1;const rungs=4+(lvlIdx>8?2:0);
  for(let i=0;i<rungs;i++){
    S.plats.push(new Rect(px,py,140,16));
    px+=dir*150;if(px>baseX+340){dir=-1;px=baseX+340;}else if(px<baseX){dir=1;px=baseX;}
    py-=70;
  }
  S.plats.push(new Rect(baseX+110,py,220,16));
  S.x=baseX+520;
  for(let i=0;i<4;i++){S.plats.push(new Rect(S.x,GROUND-(4-i)*62,120,16));S.x+=140;}
  S.plats.push(new Rect(S.x,GROUND,200,50));S.x+=200;
  return offDragon();
}
function layoutGauntlet(S){
  const{lvlIdx}=S;const len=1500+lvlIdx*40;
  S.plats.push(new Rect(S.x,GROUND,len,50));
  for(let i=0;i<6;i++)S.plats.push(new Rect(S.x+220+i*220,GROUND-80-(i%2)*40,120,15));
  S.x+=len;
  return offDragon();
}
function layoutRiver(S){
  const{lvlIdx,cfg}=S;S.plats.push(new Rect(S.x,GROUND,180,50));S.x+=180;
  const riverW=560+lvlIdx*20,startR=S.x;
  if(cfg.hasLava)S.lavaArr.push(new Lava(startR,riverW,GROUND));
  else S.waterZones.push(new Water(startR,riverW,GROUND));
  S.plats.push(new Rect(startR+60,GROUND-50,70,15));
  S.plats.push(new Rect(startR+200,GROUND-70,70,15));
  const dlb=startR+300,drb=startR+riverW-130;
  const dragon=new Dragon(dlb+20,GROUND-30,dlb,drb,1.4+lvlIdx*0.05);
  S.x=startR+riverW;S.plats.push(new Rect(S.x,GROUND,200,50));S.x+=200;
  return dragon;
}
// bridges — solid land segments split by hazard pits, each spanned by a pair of
// stepping platforms at alternating heights (a steady hop-hop-hop rhythm).
function layoutBridges(S){
  const{lvlIdx}=S;const segs=4+(lvlIdx>8?1:0);
  for(let i=0;i<segs;i++){
    const segW=170+rnd(0,60);S.plats.push(new Rect(S.x,GROUND,segW,50));S.x+=segW;
    if(i<segs-1){
      const gw=150+min(lvlIdx*4,90);const a=i%2===0;
      hazardPit(S,gw,[
        {dx:gw*0.30-35,dy:a?60:104,w:70},
        {dx:gw*0.62-35,dy:a?104:60,w:70},
      ]);
    }
  }
  return offDragon();
}
// ascent — a long zigzag climb of narrow ledges up to a high traverse, then a
// measured stepped descent back to the ground (a vertical, never-look-down level).
function layoutAscent(S){
  const{lvlIdx}=S;S.plats.push(new Rect(S.x,GROUND,150,50));S.x+=150;
  const baseX=S.x;let y=GROUND-88,x=baseX,dir=1;const rungs=6+(lvlIdx>10?2:0);
  for(let i=0;i<rungs;i++){
    S.plats.push(new Rect(x,y,140,16));
    x+=dir*155;if(x>baseX+310){dir=-1;x=baseX+310;}else if(x<baseX){dir=1;x=baseX;}
    y-=78;
  }
  S.plats.push(new Rect(baseX+60,y+78-16,240,16)); // high traverse ledge
  let dx=baseX+360;
  for(let i=0;i<4;i++){S.plats.push(new Rect(dx,GROUND-(4-i)*68,120,16));dx+=145;}
  S.x=dx;S.plats.push(new Rect(S.x,GROUND,200,50));S.x+=200;
  return offDragon();
}
// chasm — a HIGH crossing: climb two big steps onto a rim, a dragon ferries you
// across a wide hazard at rim height, then descend the far side. (river crosses
// low; chasm crosses high.)
function layoutChasm(S){

// ruins — a row of solid pillars of varying height with hazard gaps between them;
// hop pillar-top to pillar-top across the void below.
function layoutRuins(S){

// cascade — climb to a high source, then descend a long waterfall of small ledges
// over a hazard river before landing back on solid ground (a net-downward level).
function layoutCascade(S){
  const{lvlIdx,cfg}=S;S.plats.push(new Rect(S.x,GROUND,140,50));S.x+=140;
  for(let i=0;i<2;i++)S.plats.push(new Rect(S.x+i*110,GROUND-(i+1)*70,110,(i+1)*70+50));
  let x=S.x+2*110,y=GROUND-2*70;const descStart=x;

// causeway — a long ground sprint broken by low hurdle walls to leap, with

function layoutCauseway(S){

// pyramid — a grand symmetric stepped mountain: climb one face, cross a flat apex
// (a natural perch for defenders), then descend the mirror face. No hazard.

// moat — a fortress: a raised keep crowned with battlement teeth, defended on
// both sides by a hazard moat that's crossed by a single stepping stone.
function layoutMoat(S){

  const mw=130+min(lvlIdx*3,60);

  S.x=kx+keepW;

// mesa — a high tableland: a ramp climbs to a long elevated road (patrolled by
// enemies) broken by low hurdle walls, ending in a stepped cliff descent.
function layoutMesa(S){

  for(let i=0;i<3;i++)S.plats.push(new Rect(S.x+i*120,GROUND-(i+1)*60,120,(i+1)*60+50));
  S.x+=3*120;

// spiral — a tight vertical corkscrew: ledges rotate right-center-left-center as
// they rise around an open shaft up to a summit, then a quick stepped descent.
function layoutSpiral(S){
  const{lvlIdx}=S;S.plats.push(new Rect(S.x,GROUND,150,50));S.x+=150;
  const base=S.x,offs=[0,150,300,150];
  let y=GROUND-64,lastOff=0;const rungs=6+(lvlIdx>12?1:0);
  for(let i=0;i<rungs;i++){lastOff=offs[i%offs.length];S.plats.push(new Rect(base+lastOff,y,130,15));y-=64;}
  const sumX=base+lastOff-25;
  S.plats.push(new Rect(sumX,y,180,15)); // summit directly above the last rung
  let dx=sumX+220;
  for(let i=0;i<4;i++){S.plats.push(new Rect(dx,GROUND-(4-i)*64,120,16));dx+=140;}
  S.x=dx;S.plats.push(new Rect(S.x,GROUND,200,50));S.x+=200;
  return offDragon();
}
// stepstones — a long open hazard crossed only by small stepping stones at
// alternating heights: a pure precision-hopping gauntlet with no ground between.
function layoutStepstones(S){
  const{lvlIdx,cfg}=S;S.plats.push(new Rect(S.x,GROUND,150,50));S.x+=150;
  const n=7+(lvlIdx>8?2:0),span=n*150+120,startH=S.x;
  if(cfg.hasLava)S.lavaArr.push(new Lava(startH,span,GROUND));

// archipelago — two clusters of tiny isles over open water linked by a dragon

const LAYOUTS={stairs:layoutStairs,pits:layoutPits,islands:layoutIslands,tower:layoutTower,gauntlet:layoutGauntlet,river:layoutRiver,
  bridges:layoutBridges,ascent:layoutAscent,chasm:layoutChasm,ruins:layoutRuins,cascade:layoutCascade,causeway:layoutCauseway,
  pyramid:layoutPyramid,moat:layoutMoat,mesa:layoutMesa,spiral:layoutSpiral,stepstones:layoutStepstones,archipelago:layoutArchipelago};

function generateLevel(lvlIdx){
  const cfg=LEVELS[lvlIdx];
  const eSpd=cfg.eSpd*ENEMY_SPEED;
  const S={cfg,lvlIdx,plats:[],waterZones:[],lavaArr:[],x:0};

  // Start flat (spawn safe zone)
  const startW=max(300,500-lvlIdx*10);
  S.plats.push(new Rect(0,GROUND,startW,50));S.x=startW;

  // Build the level body from the configured archetype
  const dragon=(LAYOUTS[cfg.layout]||layoutStairs)(S);

  // Boss arena
  const bossStartX=S.x,bossW=700+lvlIdx*20;
  S.plats.push(new Rect(bossStartX,GROUND,bossW,50));S.x=bossStartX+bossW;
  const bx=bossStartX+bossW-300;
  boss=new Boss(bx,GROUND-60,bx-100,bx+180,cfg.boss);
  boss.hp=cfg.bossHp;boss.maxHp=cfg.bossHp;boss.speed=1.2+lvlIdx*0.05;
  const flag=new Flag(bossStartX+bossW-100,GROUND);

  const totalW=S.x;const plats=S.plats,enemies=[],coins=[],waterZones=S.waterZones;

  // Distribute enemies on walkable platforms (skip spawn zone and boss arena)
  const walk=plats.filter(p=>p.w>=90&&p.t<=GROUND&&(p.x+p.w)>220&&p.x<bossStartX-40);
  const eCount=cfg.enemies;
  for(let i=0;i<eCount;i++){
    if(!walk.length)break;
    const p=walk[i%walk.length];
    const frac=(i*0.61803398875)%1; // golden-ratio spacing spreads enemies across each platform
    const ex=clamp(p.x+frac*p.w,p.x+24,p.x+p.w-24);
    enemies.push(new Enemy(ex,p.t-34,p.x+8,p.x+p.w-8,eSpd));
  }

  // Distribute coins on platforms
  for(const p of plats){
    if(p.w<100||p.t>GROUND)continue;
    const nc=max(1,floor(p.w/120));
    for(let i=0;i<nc;i++){const cx=p.x+40+i*(p.w-80)/max(1,nc-1);coins.push(new Coin(cx,p.t-30));}
  }

  // One power orb per level, themed to the level's element, placed mid-path on a walkable platform.
  const el=(FORM_DATA[cfg.form]||{}).atk||'wave';
  const pst=POWER_STYLE[el]||POWER_STYLE.wave;
  let powerItem;
  if(walk.length){
    const midX=bossStartX*0.5;
    let best=walk[0],bd=Infinity;
    for(const p of walk){const d=abs((p.x+p.w/2)-midX);if(d<bd){bd=d;best=p;}}
    powerItem=new CollectItem(best.x+best.w/2-14,best.t-48,pst.letter,pst.col,el);
  }else{
    powerItem=new CollectItem(-100,-100,'',pst.col,el);powerItem.collected=true;
  }

  // Clouds
  const clouds=[];for(let i=0;i<15;i++)clouds.push(new Cloud(rnd(0,totalW),rnd(30,150),rnd(50,120)));

  lavaZones=S.lavaArr;
  return{plats,enemies,coins,flag,clouds,water:waterZones,dragon,powerItem};
}

// ===== STAGE PROGRESS (persisted per-browser via localStorage) =====
// maxStageUnlocked is the 0-based index of the furthest stage the player may
// start from in the stage-select screen. Stage 0 is always available.
let maxStageUnlocked=0,selectedStageIdx=0,lockedFlashT=0;
const STAGE_COLS=5; // columns in the stage-select grid (also the up/down nav step)
const PROGRESS_KEY='jumpRun.progress.v1';
function loadProgress(){
  try{const raw=localStorage.getItem(PROGRESS_KEY);if(!raw)return;
    const o=JSON.parse(raw);
    if(o&&typeof o.maxStageUnlocked==='number')maxStageUnlocked=clamp(o.maxStageUnlocked|0,0,STAGES.length-1);
  }catch(e){/* storage unavailable (private mode / sandboxed iframe) — play without persistence */}
}
function saveProgress(){
  try{localStorage.setItem(PROGRESS_KEY,JSON.stringify({maxStageUnlocked}));}catch(e){/* ignore */}
}
// Clearing the last level of a stage unlocks the next stage.
function maybeUnlockStage(clearedLevel){
  if(clearedLevel%LEVELS_PER_STAGE!==0)return;
  const next=clearedLevel/LEVELS_PER_STAGE; // 0-based index of the next stage
  if(next<STAGES.length&&next>maxStageUnlocked){maxStageUnlocked=next;saveProgress();}
}
loadProgress();

function startGame(startLevel=1){
  initAudio();currentLevel=clamp(startLevel|0,1,LEVELS.length);stats.reset();
  stats.levelReached=currentLevel;
  unlockedForms=['sparky','bigrest'];
  player=new Player(50,H-130);
  player.form=LEVELS[currentLevel-1].form;
  if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
  loadLevel();
}
function loadLevel(){
  initBgElements();
  const lv=generateLevel(currentLevel-1);
  plats=lv.plats;enemies=lv.enemies;coins=lv.coins;flag=lv.flag;clouds=lv.clouds;
  waterZones=lv.water;dragon=lv.dragon;powerItem=lv.powerItem;
  tick=0;won=false;state='playing';atkQueued=false;guitarAtkQueued=false;camX=0;particles.length=0;
  player.rect.x=50;player.rect.y=H-130;player.vy=0;
  const fd=FORM_DATA[player.form]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;
}
function completeLevel(){
  const cfg=LEVELS[currentLevel-1];const fd=FORM_DATA[cfg.form]||{};
  if(!unlockedForms.includes(cfg.form))unlockedForms.push(cfg.form);
  if(!stats.formsCollected.includes(cfg.form))stats.formsCollected.push(cfg.form);
  if(fd.evolve){
    evolutionFrom=cfg.form;evolutionTo=fd.evolve;
    if(!unlockedForms.includes(fd.evolve))unlockedForms.push(fd.evolve);
    if(!stats.formsCollected.includes(fd.evolve))stats.formsCollected.push(fd.evolve);
  }else{evolutionFrom=null;evolutionTo=null;}
  maybeUnlockStage(currentLevel);
  state='levelcomplete';completeTimer=0;sfxLevelUp();
}
function advanceLevel(){
  if(currentLevel>=LEVELS.length){state='gameover';won=true;stats.finalize(player,true);stats.publish();sfxWin();return;}
  currentLevel++;stats.levelReached=currentLevel;
  const nextCfg=LEVELS[currentLevel-1];
  player.form=nextCfg.form;
  if(!unlockedForms.includes(player.form))unlockedForms.push(player.form);
  const savedScore=player.score,savedLives=player.lives;
  loadLevel();player.score=savedScore;player.lives=savedLives;
}
function switchForm(){
  if(unlockedForms.length<=1)return;
  const idx=unlockedForms.indexOf(player.form);
  const next=(idx+1)%unlockedForms.length;
  player.form=unlockedForms[next];
  const fd=FORM_DATA[player.form]||{};
  player.maxFlyCharges=fd.fly||0;player.flyCharges=player.maxFlyCharges;

// Layout the stage cells in a 5x2 grid. Used by both the renderer and the
// pointer hit-test so they always agree.
function stageCells(){
  const cols=STAGE_COLS,rows=Math.ceil(STAGES.length/STAGE_COLS),cw=150,ch=124,gapX=20,gapY=24;
  const gridW=cols*cw+(cols-1)*gapX,startX=(W-gridW)/2,startY=205;
  const cells=[];
  for(let i=0;i<STAGES.length;i++){
    const c=i%cols,r=floor(i/cols);
    cells.push({idx:i,x:startX+c*(cw+gapX),y:startY+r*(ch+gapY),w:cw,h:ch,unlocked:i<=maxStageUnlocked});
  }
  return cells;
}
function enterStageSelect(){
  initAudio();state='stageselect';
  selectedStageIdx=clamp(maxStageUnlocked,0,STAGES.length-1);
  cv.style.display='block';cv.focus();anyKey=false;
}
function moveSel(delta){
  let n=selectedStageIdx+delta;
  n=clamp(n,0,STAGES.length-1);selectedStageIdx=n;
}
function confirmStage(){
  if(selectedStageIdx<=maxStageUnlocked){startGame(selectedStageIdx*LEVELS_PER_STAGE+1);}
  else{lockedFlashT=40;sfxHit();}
}
function trySelectStage(idx){
  if(idx<0||idx>=STAGES.length)return;
  selectedStageIdx=idx;confirmStage();
}
function pickStageAt(px,py){
  for(const c of stageCells()){
    if(px>=c.x&&px<=c.x+c.w&&py>=c.y&&py<=c.y+c.h){selectedStageIdx=c.idx;confirmStage();return;}
  }
}
function updateStageSelect(){
  if(lockedFlashT>0)lockedFlashT--;
  for(let d=1;d<=9;d++){if(keys['Digit'+d]||keys['Numpad'+d]){keys['Digit'+d]=false;keys['Numpad'+d]=false;trySelectStage(d-1);}}
  if(keys.Digit0||keys.Numpad0){keys.Digit0=false;keys.Numpad0=false;trySelectStage(9);}
  if(keys.ArrowLeft){keys.ArrowLeft=false;moveSel(-1);}
  if(keys.ArrowRight){keys.ArrowRight=false;moveSel(1);}
  if(keys.ArrowUp){keys.ArrowUp=false;moveSel(-STAGE_COLS);}
  if(keys.ArrowDown){keys.ArrowDown=false;moveSel(STAGE_COLS);}
  if(keys.Enter||keys.Space){keys.Enter=false;keys.Space=false;confirmStage();}
  if(keys.Escape||keys.KeyB){keys.Escape=false;keys.KeyB=false;state='title';anyKey=false;}
}

const MAP_TINTS={
  meadow:  {g:'#5cb85c',d:'#2e7d32',s0:'#cdeeff',s1:'#8fcdf0'},
  forest:  {g:'#3f8f4a',d:'#1f4d28',s0:'#bfe0d4',s1:'#6fa890'},

  swamp:   {g:'#6e7d44',d:'#3a4720',s0:'#bcc69a',s1:'#7e8c5a'},
  cave:    {g:'#8866b8',d:'#3a2a58',s0:'#c2aada',s1:'#6a5690'},
  volcano: {g:'#d8642e',d:'#7a1c10',s0:'#ffc89a',s1:'#e07848'},
  ice:     {g:'#a6e0ee',d:'#5b9fc0',s0:'#e6f7ff',s1:'#b6e2f2'},

  twilight:{g:'#6a5aa8',d:'#2a2050',s0:'#bcb0e8',s1:'#7a6cb0'},
};
function mapTint(theme){return MAP_TINTS[theme]||MAP_TINTS.meadow;}

// Build (once) the world-coordinate node positions for every level along a
// winding path, grouped into stages with an extra gap between stages.
function buildMapNodes(){
  if(MAP_NODES)return MAP_NODES;
  const nodes=[];let x=MAP_START_X;
  for(let s=0;s<STAGES.length;s++){
    if(s>0)x+=MAP_STAGE_GAP;
    for(let l=0;l<LEVELS_PER_STAGE;l++){
      const gi=s*LEVELS_PER_STAGE+l;
      const y=MAP_BASE_Y+sin(gi*0.5)*MAP_AMP+cos(gi*0.27)*16;
      nodes.push({x,y,stage:s,level:gi,stageStart:l===0});
      x+=MAP_NODE_GAP;
    }
  }
  MAP_NODES=nodes;MAP_TOTAL_W=x+MAP_START_X;
  return nodes;
}

// Enter the overworld after a level was cleared: set up the walk from the
// cleared node to the next level's node (or stay put on the final level).
function enterWorldMap(){
  buildMapNodes();
  const last=MAP_NODES.length-1;
  const fromIdx=clamp(currentLevel-1,0,last);          // node just cleared (currentLevel is 1-based)
  const isFinal=currentLevel>=LEVELS.length;
  const toIdx=isFinal?fromIdx:clamp(currentLevel,0,last);
  mapWalk={from:fromIdx,to:toIdx,t:isFinal?1:0,phase:0,done:isFinal,
           ax:MAP_NODES[fromIdx].x,ay:MAP_NODES[fromIdx].y,faceDir:1};
  mapCamX=clamp(MAP_NODES[fromIdx].x-W*0.42,0,max(0,MAP_TOTAL_W-W));
  mapAnim=0;mapDoneT=0;
  state='worldmap';
}

function updateWorldMap(){
  mapAnim++;
  const nodes=MAP_NODES,mw=mapWalk,a=nodes[mw.from],b=nodes[mw.to];
  mw.faceDir=b.x>=a.x?1:-1;
  if(!mw.done){
    const dist=sqrt((b.x-a.x)*(b.x-a.x)+(b.y-a.y)*(b.y-a.y))||1;
    mw.t=min(1,mw.t+3.0/dist);
    mw.phase+=0.4;
    if(mw.t>=1){mw.done=true;mapDoneT=0;if(typeof sfxItem==='function')sfxItem();}
  }else mapDoneT++;
  mw.ax=lerp(a.x,b.x,mw.t);
  mw.ay=lerp(a.y,b.y,mw.t)-(mw.done?0:abs(sin(mw.phase))*5);
  const tcam=clamp(mw.ax-W*0.42,0,max(0,MAP_TOTAL_W-W));
  mapCamX+=(tcam-mapCamX)*0.12;
  if(mw.done&&mapDoneT>24&&(anyKey||mapDoneT>150)){anyKey=false;advanceLevel();}
}

function drawMapAvatar(sx,sy,walking,phase,faceDir){
  const col=(FORM_DATA[player&&player.form]&&FORM_DATA[player.form].color)||'#ffdc28';

  ctx.save();ctx.globalAlpha=0.22;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(sx,sy+18,16,5,0,0,TAU);ctx.fill();ctx.restore();
  // legs (alternating swing while walking)
  const sw=walking?sin(phase)*5:0;
  ctx.strokeStyle='#3a2a18';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(sx-5,cy+8);ctx.lineTo(sx-5+sw,cy+18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx+5,cy+8);ctx.lineTo(sx+5-sw,cy+18);ctx.stroke();
  // body
  fCir(sx,cy,14,col);
  sCir(sx,cy,14,'rgba(0,0,0,0.25)',2);
  ctx.save();ctx.globalAlpha=0.35;fCir(sx,cy+4,8,'#fff');ctx.restore();

}

function drawWorldMap(){

  for(let i=0;i<6;i++){

  for(const n of nodes){

  // --- nodes ---
  for(const n of nodes){

    if(cleared){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.lineCap='round';

    if(target){const pr=r+6+sin(mapAnim*0.12)*3;sCir(sx,n.y,pr,'#ffd700',3);
      if(mw.done&&mapDoneT<28){const a2=1-mapDoneT/28;ctx.save();ctx.globalAlpha=a2;sCir(sx,n.y,r+10+(28-mapDoneT),'#fff',2);ctx.restore();}}
    if(bossNode){dLine(sx+r-1,n.y,sx+r-1,n.y-15,'#fff',2);

  dText('Cleared '+currentLevel+' / '+LEVELS.length,12,W-80,17,'rgba(255,255,255,0.75)',true,false,false);

// ===== GAME UPDATE =====
function updateGame(){
  tick++;dragon.update();
  // Cheat: commit a pending single-digit level jump shortly after the digit is typed.
  if(lvlJumpTimer&&performance.now()-lvlJumpTimer>LEVEL_JUMP_TIMEOUT_MS)commitLevelJump();
  if(cheatMsgT>0)cheatMsgT--;
  if(player.onGround&&player.rect.b>=dragon.rect.t&&player.rect.b<=dragon.rect.t+8
    &&player.rect.r>dragon.rect.l&&player.rect.l<dragon.rect.r)player.rect.x+=dragon.speed;
  const allP=plats.concat([dragon.rect]);
  player.update(allP);
  if(atkQueued){player.attack();atkQueued=false;}
  if(guitarAtkQueued){player.guitarAttack();guitarAtkQueued=false;}
  // R-key form switching
  if(keys.KeyR){switchForm();keys.KeyR=false;}
  for(const e of enemies)e.update();
  // Enemy collision
  for(const e of enemies){if(!e.alive)continue;
    if(player.atkRect&&player.atkTimer>0&&e.rect.hit(player.atkRect)){
      e.alive=false;player.score+=100;sfxStomp();stats.enemiesZapped++;
      emit(e.rect.cx,e.rect.cy,15,1,3,20,3,'#ffd700',0.05);shake(3,6);continue;}
    if(player.rect.hit(e.rect)){
      // Bigrest crushes enemies by walking into them
      if(player.form==='bigrest'){
        e.alive=false;player.score+=100;sfxStomp();stats.enemiesStomped++;
        emit(e.rect.cx,e.rect.cy,12,1,2.5,18,3,'#ffd700',0.05);shake(3,6);
      }else if(player.vy>0&&player.rect.b-e.rect.t<22){
        e.alive=false;player.vy=JUMP_FORCE*0.6;player.score+=100;sfxStomp();stats.enemiesStomped++;
        emit(e.rect.cx,e.rect.cy,12,1,2.5,18,3,'#ffd700',0.05);
      }else if(player.invincible<=0&&!player.godmode){
        player.lives--;sfxHit();shake(5,12);stats.deaths++;stats.enemyDeaths++;
        emit(player.rect.cx,player.rect.cy,10,1,2,15,3,'#ff4040',0.03);
        if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
        respawn();}}}
  // Coins
  for(const c of coins)if(!c.collected&&player.rect.hit(c.rect)){
    c.collected=true;player.score+=50;sfxCoin();stats.coinsCollected++;
    emit(c.rect.cx,c.rect.cy,8,0.8,2,15,2,'#ffd700',-0.02);}
  // Power orb: temporary boost (fly refill + brief invincibility + score)
  if(powerItem&&!powerItem.collected&&player.rect.hit(powerItem.rect)){
    powerItem.collected=true;player.score+=200;
    player.invincible=max(player.invincible,180);
    player.flyCharges=player.maxFlyCharges=max(player.maxFlyCharges,3);
    sfxItem();
    const st=POWER_STYLE[powerItem.element]||POWER_STYLE.wave;
    emit(powerItem.rect.cx,powerItem.rect.cy,16,1.2,2,22,3,st.col,-0.02);
    flashCheat('POWER: '+st.label+' boost');}
  // Boss
  if(boss&&boss.alive){boss.update();
    if(player.atkRect&&player.atkTimer>0&&boss.rect.hit(player.atkRect)){
      const killed=boss.hit();
      if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,25,1.5,4,25,4,'#ffd700',0.05);shake(6,15);}
      else{sfxStomp();shake(3,6);emit(boss.rect.cx,boss.rect.cy,8,1,2,12,2,'#ff4040',0.03);}}
    // Guitar attack on boss
    if(player.guitarAtkRect&&player.guitarAtkTimer>0&&boss.rect.hit(player.guitarAtkRect)){
      const killed=boss.hit();
      if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,30,2,5,30,5,'#ffff00',0.08);shake(8,20);}
      else{sfxStomp();shake(5,10);emit(boss.rect.cx,boss.rect.cy,12,1.5,3,18,4,'#ffff00',0.05);}}
    if(player.rect.hit(boss.rect)){
      if(player.vy>0&&player.rect.b-boss.rect.t<22){
        const killed=boss.hit();player.vy=JUMP_FORCE*0.6;
        if(killed){player.score+=500;sfxStomp();stats.bossesKilled++;emit(boss.rect.cx,boss.rect.cy,25,1.5,4,25,4,'#ffd700',0.05);shake(6,15);}
        else{sfxStomp();shake(3,6);}
      }else if(player.invincible<=0&&!player.godmode){
        player.lives--;sfxHit();shake(5,12);stats.deaths++;stats.enemyDeaths++;
        emit(player.rect.cx,player.rect.cy,10,1,2,15,3,'#ff4040',0.03);
        if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
        respawn();}}}
  // Lava
  for(const lv of lavaZones)if(player.rect.hit(lv.rect)){
    if(player.invincible<=0&&!player.godmode){player.lives--;sfxHit();shake(4,10);stats.deaths++;stats.lavaDeaths++;
      emit(player.rect.cx,lv.yt,12,1,3,18,3,'#ff6020',-0.08);
      if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
      respawn();}break;}
  // Water
  for(const w of waterZones)if(player.rect.hit(w.rect)){
    if(player.invincible<=0&&!player.godmode){player.lives--;sfxHit();shake(4,10);stats.deaths++;stats.waterDeaths++;
      emit(player.rect.cx,w.yt,10,1,3,15,3,'#60b8ff',-0.08);
      if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}
      respawn();}break;}
  // Fall
  if(player.rect.t>H+100){
    if(player.godmode){respawn();}
    else{player.lives--;sfxHit();stats.deaths++;stats.fallDeaths++;
      if(player.lives<=0){state='gameover';won=false;stats.finalize(player,false);stats.publish();return;}respawn();}}
  // Flag
  if(player.rect.hit(flag.rect)&&(!boss||!boss.alive)){completeLevel();return;}
  stats.maxXReached=Math.max(stats.maxXReached,player.rect.x);
  targetCamX=player.rect.cx-W/3;targetCamX=max(0,targetCamX);camX=lerp(camX,targetCamX,CAM_LERP);
  for(let i=particles.length-1;i>=0;i--){particles[i].update();if(particles[i].dead)particles.splice(i,1);}
  if(shakeT>0)shakeT--;else{shakeX=0;shakeY=0;}
}

// ===== GAME DRAW =====
function drawGame(){
  ctx.save();if(shakeT>0)ctx.translate((random()-0.5)*shakeX*2,(random()-0.5)*shakeY*2);
  drawBackground(camX,tick);
  for(const c of clouds)c.draw(camX);
  for(const p of plats)drawPlatform(p,camX,tick);
  for(const w of waterZones)w.draw(camX,tick);
  for(const lv of lavaZones)lv.draw(camX,tick);
  dragon.draw(camX,tick);
  for(const c of coins)c.draw(camX,tick);
  if(powerItem)powerItem.draw(camX,tick);
  for(const e of enemies)e.draw(camX,tick);
  if(boss&&boss.alive)boss.draw(camX,tick);
  flag.draw(camX,tick);
  for(const p of particles)p.draw(camX);
  player.draw(camX,tick);
  ctx.restore();
  drawHUD(player,tick);
}

// ===== MAIN LOOP =====
let winSfxPlayed=false;
function loop(){
  if(state==='title'){
    titleAnim+=0.016;drawTitle(titleAnim*60);
    if(anyKey&&playerName){enterStageSelect();winSfxPlayed=false;}
    else if(anyKey&&!playerName){cv.style.display='none';nameContainer.style.display='block';nameInput.value='';nameInput.focus();anyKey=false;}
  }else if(state==='stageselect'){
    titleAnim+=0.016;updateStageSelect();
    if(state==='stageselect')drawStageSelect();
  }else if(state==='playing'){
    updateGame();if(state==='playing')drawGame();
    else if(state==='levelcomplete'){drawLevelComplete(tick);}
    else{drawGameOver(tick);winSfxPlayed=won;}
  }else if(state==='levelcomplete'){
    completeTimer++;drawLevelComplete(completeTimer);
    if((anyKey&&completeTimer>30)||completeTimer>240){anyKey=false;enterWorldMap();}
  }else if(state==='worldmap'){
    updateWorldMap();if(state==='worldmap')drawWorldMap();
  }else if(state==='gameover'){
    drawGameOver(tick);tick++;
    if(keys.KeyR){playerName='';state='title';anyKey=false;winSfxPlayed=false;}
    if(keys.KeyQ){state='title';anyKey=false;}
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
