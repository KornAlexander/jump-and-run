<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Jump &amp; Run — V2 Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
canvas{border-radius:8px;box-shadow:0 0 60px rgba(80,160,255,0.25)}
</style>
</head><body>
<canvas id="c" width="900" height="600" tabindex="0"></canvas>
<div id="nameContainer" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none">
  <label style="color:#fff;font-size:20px;display:block;margin-bottom:12px">Enter your name:</label>
  <input id="playerNameInput" type="text" maxlength="20" placeholder="Player" style="font-size:18px;padding:10px 15px;border-radius:8px;border:2px solid #60a8ff;background:rgba(20,30,50,0.9);color:#fff;text-align:center;width:240px" />
  <div style="margin-top:12px;color:#aaa;font-size:14px">Press Enter to continue</div>
</div>
<pre id="gameStats" style="display:none"></pre>
<script>
(() => {
"use strict";
// ===== SETUP =====
const cv = document.getElementById('c'), ctx = cv.getContext('2d', { alpha: false });
const W = 900, H = 600;
ctx.imageSmoothingEnabled = false;
cv.focus();

// ===== AUDIO ENGINE (Web Audio API) =====
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, type='square', vol=0.08) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxJump() { playTone(400, 0.12, 'sine', 0.06); setTimeout(() => playTone(600, 0.08, 'sine', 0.04), 50); }
function sfxCoin() { playTone(880, 0.06, 'square', 0.05); setTimeout(() => playTone(1320, 0.1, 'square', 0.04), 60); }
function sfxStomp() { playTone(200, 0.15, 'sawtooth', 0.06); }
function sfxHit() { playTone(120, 0.3, 'sawtooth', 0.08); }
function sfxThunder() { for (let i = 0; i < 4; i++) setTimeout(() => playTone(80 + Math.random() * 200, 0.08, 'sawtooth', 0.05), i * 30); }
function sfxWave() { playTone(300, 0.2, 'sine', 0.04); setTimeout(() => playTone(250, 0.25, 'sine', 0.03), 80); }
function sfxItem() { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.12, 'square', 0.04), i * 80)); }
function sfxWin() { [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.05), i * 120)); }

// ===== CONSTANTS =====
const GRAVITY = 0.65, JUMP_FORCE = -13.5, PLAYER_SPEED = 5.2, ENEMY_SPEED = 1;
const PW = 40, PH = 48, COIN_R = 10;
const ATK_DUR = 22, ATK_CD = 36, ATK_W = PW * 3.5, ATK_H = 44;
const GROUND = H - 50, STEP_H = 52, STEP_W = 260;
const CAM_LERP = 0.08;

// ===== STATS TRACKER =====
const stats = {
  startTime: 0, endTime: 0, score: 0, won: false, livesLeft: 0,
  deaths: 0, coinsCollected: 0, enemiesStomped: 0, enemiesZapped: 0,
  attacks: 0, jumps: 0, formsCollected: [], finalForm: 'hero',
  maxXReached: 0, waterDeaths: 0, fallDeaths: 0, enemyDeaths: 0,
  lavaDeaths: 0, bossesKilled: 0, levelReached: 1,
  reset() {
    this.startTime = Date.now(); this.endTime = 0; this.score = 0; this.won = false;
    this.livesLeft = 3; this.deaths = 0; this.coinsCollected = 0;
    this.enemiesStomped = 0; this.enemiesZapped = 0; this.attacks = 0; this.jumps = 0;
    this.formsCollected = []; this.finalForm = 'hero';
    this.maxXReached = 0; this.waterDeaths = 0; this.fallDeaths = 0; this.enemyDeaths = 0;
    this.lavaDeaths = 0; this.bossesKilled = 0; this.levelReached = 1;
  },
  finalize(player, won) {
    this.endTime = Date.now(); this.score = player.score; this.won = won;
    this.livesLeft = player.lives; this.finalForm = player.form;
    this.levelReached = currentLevel;
  },
  toJSON() {
    return {
      player_name: playerName || 'Player',
      timestamp: new Date(this.startTime).toISOString(),
      duration_seconds: Math.round((this.endTime - this.startTime) / 1000 * 10) / 10,
      score: this.score, won: this.won, lives_left: this.livesLeft,
      deaths_total: this.deaths, deaths_enemy: this.enemyDeaths,
      deaths_water: this.waterDeaths, deaths_fall: this.fallDeaths,
      deaths_lava: this.lavaDeaths,
      coins_collected: this.coinsCollected,
      enemies_stomped: this.enemiesStomped, enemies_zapped: this.enemiesZapped,
      bosses_killed: this.bossesKilled,
      attacks_used: this.attacks, jumps: this.jumps,
      forms_collected: this.formsCollected.join(','),
      final_form: this.finalForm,
      max_x_reached: Math.round(this.maxXReached),
      level_reached: this.levelReached
    };
  },
  publish() {
    const el = document.getElementById('gameStats');
    const data = this.toJSON();
    const json = JSON.stringify(data);
    if (el) { el.textContent = json; el.style.display = 'block'; }
  }
};

// ===== INPUT =====
const keys = {};
let atkQueued = false, anyKey = false;
let playerName = '';
const nameInput = document.getElementById('playerNameInput');
const nameContainer = document.getElementById('nameContainer');

cv.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'KeyF') atkQueued = true; anyKey = true; e.preventDefault(); });
cv.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });
cv.addEventListener('click', () => { cv.focus(); initAudio(); anyKey = true; });

nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    playerName = nameInput.value.trim() || 'Player';
    nameContainer.style.display = 'none';
    cv.style.display = 'block';
    cv.focus();
    anyKey = true;
  }
});

cv.focus();

// ===== HELPERS =====
const { sin, cos, PI, floor, round, abs, max, min, sqrt, random, atan2 } = Math;
const TAU = PI * 2;
const rnd = (a, b) => floor(random() * (b - a + 1)) + a;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => max(lo, min(hi, v));

// ===== RECT =====
class Rect {
  constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; }
  get l() { return this.x; } get r() { return this.x + this.w; } get t() { return this.y; } get b() { return this.y + this.h; }
  get cx() { return this.x + this.w / 2; } get cy() { return this.y + this.h / 2; }
  set l(v) { this.x = v; } set r(v) { this.x = v - this.w; } set t(v) { this.y = v; } set b(v) { this.y = v - this.h; }
  hit(o) { return this.x < o.x + o.w && this.x + this.w > o.x && this.y < o.y + o.h && this.y + this.h > o.y; }
}

// ===== PARTICLE SYSTEM =====
const particles = [];
class Particle {
  constructor(x, y, vx, vy, life, r, col, grav = 0, shrink = true) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life; this.r = r; this.col = col;
    this.grav = grav; this.shrink = shrink; this.dead = false;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.vy += this.grav; this.life--;
    if (this.life <= 0) this.dead = true;
  }
  draw(cam) {
    const a = this.life / this.maxLife;
    const r = this.shrink ? this.r * a : this.r;
    ctx.globalAlpha = a * 0.8;
    ctx.fillStyle = this.col;
    ctx.beginPath(); ctx.arc(this.x - cam, this.y, max(r, 0.5), 0, TAU); ctx.fill();
    ctx.globalAlpha = 1;
  }
}
function emit(x, y, count, spread, speed, life, r, col, grav = 0) {
  for (let i = 0; i < count; i++) {
    const a = random() * TAU;
    const s = random() * speed;
    particles.push(new Particle(x, y, cos(a) * s * spread, sin(a) * s - random() * speed * 0.5, life + rnd(-5, 5), r + random() * r * 0.5, col, grav));
  }
}

// ===== SCREEN SHAKE =====
let shakeX = 0, shakeY = 0, shakeT = 0;
function shake(intensity, dur) { shakeT = dur; shakeX = intensity; shakeY = intensity; }

// ===== GRADIENT HELPERS =====
function radGrad(x, y, r1, r2, c1, c2) {
  const g = ctx.createRadialGradient(x, y, r1, x, y, r2); g.addColorStop(0, c1); g.addColorStop(1, c2); return g;
}
function linGrad(x1, y1, x2, y2, stops) {
  const g = ctx.createLinearGradient(x1, y1, x2, y2); for (const [s, c] of stops) g.addColorStop(s, c); return g;
}

// ===== DRAW PRIMITIVES =====
function fRect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
function fRRect(x, y, w, h, r, c) { ctx.fillStyle = c; ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill(); }
function fEll(x, y, w, h, c) { ctx.fillStyle = c; ctx.beginPath(); ctx.ellipse(x + w / 2, y + h / 2, max(w / 2, 0.1), max(h / 2, 0.1), 0, 0, TAU); ctx.fill(); }
function sEll(x, y, w, h, c, lw = 1) { ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.beginPath(); ctx.ellipse(x + w / 2, y + h / 2, max(w / 2, 0.1), max(h / 2, 0.1), 0, 0, TAU); ctx.stroke(); }
function fCir(px, py, r, c) { ctx.fillStyle = c; ctx.beginPath(); ctx.arc(px, py, max(r, 0.1), 0, TAU); ctx.fill(); }
function sCir(px, py, r, c, lw = 1) { ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.beginPath(); ctx.arc(px, py, max(r, 0.1), 0, TAU); ctx.stroke(); }
function fPoly(pts, c) { ctx.fillStyle = c; ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]); ctx.closePath(); ctx.fill(); }
function dLine(x1, y1, x2, y2, c, lw = 1) { ctx.strokeStyle = c; ctx.lineWidth = lw; ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }

function drawShadow(x, y, w, h, blur = 10) {
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(x + w / 2, y + h, w / 2 + 4, 6, 0, 0, TAU);
  ctx.fill();
  ctx.restore();
}

function dText(text, size, x, y, col, center = false, shadow = false, bold = false) {
  ctx.font = (bold ? 'bold ' : '') + size + 'px "Segoe UI",system-ui,sans-serif';
  ctx.textAlign = center ? 'center' : 'left';
  ctx.textBaseline = center ? 'middle' : 'top';
  if (shadow) { ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillText(text, x + 2, y + 2); }
  ctx.fillStyle = col; ctx.fillText(text, x, y);
}

// ===== PLAYER =====
class Player {
  constructor(x, y) {
    this.rect = new Rect(x, y, PW, PH);
    this.vy = 0; this.onGround = false;
    this.lives = 3; this.maxLives = 3; this.score = 0;
    this.facingRight = true; this.form = 'hero';
    this.atkTimer = 0; this.atkCd = 0; this.atkRect = null;
    this.runFrame = 0; this.invincible = 0;
    this.dustTimer = 0;
    this.trailHue = 0;
    this.flyCharges = 0; this.maxFlyCharges = 5;
  }

  update(plats) {
    let dx = 0;
    if (keys.ArrowLeft || keys.KeyA) { dx = -PLAYER_SPEED; this.facingRight = false; }
    if (keys.ArrowRight || keys.KeyD) { dx = PLAYER_SPEED; this.facingRight = true; }
    if ((keys.Space || keys.ArrowUp || keys.KeyW) && this.onGround) {
      this.vy = JUMP_FORCE; this.onGround = false; sfxJump(); stats.jumps++;
      emit(this.rect.cx, this.rect.b, 5, 0.8, 2, 15, 3, 'rgba(255,255,255,0.6)', 0.05);
    }

    // Bat fly ability (X key) — 5 extra flaps per jump
    if (keys.KeyX && this.form === 'bat' && !this.onGround && this.flyCharges > 0) {
      this.vy = JUMP_FORCE * 0.55;
      this.flyCharges--;
      keys.KeyX = false; // consume single press
      playTone(500 + (this.maxFlyCharges - this.flyCharges) * 60, 0.08, 'sine', 0.04);
      emit(this.rect.cx, this.rect.b, 4, 1, 1.5, 12, 2, 'rgba(160,100,220,0.6)', 0.03);
    }
    if (this.onGround) this.flyCharges = this.maxFlyCharges;

    this.vy += GRAVITY;
    this.rect.x += dx; this._cx(dx, plats);
    this.rect.y += floor(this.vy); this._cy(plats);

    if (this.atkCd > 0) this.atkCd--;
    if (this.atkTimer > 0) {
      this.atkTimer--;
      this.atkRect = this.facingRight
        ? new Rect(this.rect.r, this.rect.cy - ATK_H / 2, ATK_W, ATK_H)
        : new Rect(this.rect.l - ATK_W, this.rect.cy - ATK_H / 2, ATK_W, ATK_H);
    } else this.atkRect = null;

    if (this.invincible > 0) this.invincible--;
    if (dx !== 0) this.runFrame += 0.25;
    else this.runFrame = 0;

    // Running dust
    if (abs(dx) > 0 && this.onGround) {
      this.dustTimer++;
      if (this.dustTimer % 5 === 0)
        emit(this.rect.cx - (this.facingRight ? 8 : -8), this.rect.b - 2, 1, 0.5, 1, 12, 2, 'rgba(180,160,120,0.5)', -0.02);
    } else this.dustTimer = 0;
  }

  attack() {
    if (this.atkCd > 0 || this.atkTimer > 0) return;
    this.atkTimer = ATK_DUR; this.atkCd = ATK_CD; stats.attacks++;
    if (this.form === 'hero') sfxThunder(); else sfxWave();
  }

  _cx(dx, ps) { for (const p of ps) if (this.rect.hit(p)) { if (dx > 0) this.rect.r = p.l; else if (dx < 0) this.rect.l = p.r; } }
  _cy(ps) {
    this.onGround = false;
    for (const p of ps) if (this.rect.hit(p)) {
      if (this.vy > 0) { this.rect.b = p.t; this.vy = 0; this.onGround = true; }
      else if (this.vy < 0) { this.rect.t = p.b; this.vy = 0; }
    }
  }

  draw(cam, tick) {
    if (this.invincible > 0 && floor(this.invincible / 3) % 2 === 0) return;
    const x = this.rect.x - cam, y = this.rect.y;
    drawShadow(x, y, PW, PH);
    const squash = 1;
    ctx.save();
    ctx.translate(x + PW / 2, y + PH);
    ctx.scale(this.facingRight ? 1 : -1, 1);
    ctx.translate(-PW / 2, -PH);

    if (this.form === 'hero') this._dHero(tick);
    else if (this.form === 'fox') this._dFox(tick);
    else if (this.form === 'egg') this._dEgg(tick);
    else if (this.form === 'bat') this._dBat(tick);
    ctx.restore();

    // Attack effects (not transformed)
    if (this.atkTimer > 0 && this.atkRect) {
      if (this.form === 'hero') this._drawThunder(cam, tick);
      else this._drawSchall(cam, tick);
    }
  }

  _dHero(tick) {
    const bob = round(sin(this.runFrame) * 2);
    // Tail (lightning bolt)
    ctx.save(); ctx.translate(4, 8);
    const tg = linGrad(-14, -8, -2, 14, [[0, '#c89800'], [0.5, '#ffe040'], [1, '#c89800']]);
    fPoly([[-2, 10], [-8, 2], [-4, 8], [-14, -2], [-6, 6], [-16, 4], [-4, 14]], tg);
    ctx.restore();
    // Body
    const bodyG = linGrad(4, 8, 36, 40, [[0, '#ffe84c'], [0.4, '#ffdc28'], [1, '#d4aa00']]);
    fEll(4, 10 + bob, 32, 34, bodyG);
    // Head
    const headG = radGrad(20, 16, 2, 16, '#fff8a0', '#ffdc28');
    fEll(6, 4 + bob, 28, 24, headG);
    // Ears
    fPoly([[6, 10 + bob], [3, -14 + bob], [16, 6 + bob]], '#ffdc28');
    fPoly([[5, -10 + bob], [3, -14 + bob], [10, -4 + bob]], '#3c2814');
    fPoly([[24, 6 + bob], [37, -14 + bob], [34, 10 + bob]], '#ffdc28');
    fPoly([[30, -4 + bob], [37, -14 + bob], [36, -10 + bob]], '#3c2814');
    // Eyes (big, shiny)
    fCir(13, 15 + bob, 5, '#1a1a2e'); fCir(27, 15 + bob, 5, '#1a1a2e');
    fCir(14.5, 13.5 + bob, 2.5, '#fff'); fCir(28.5, 13.5 + bob, 2.5, '#fff');
    fCir(12, 16 + bob, 1, 'rgba(255,255,255,0.5)');
    fCir(26, 16 + bob, 1, 'rgba(255,255,255,0.5)');
    // Cheeks (gradient glow)
    ctx.save(); ctx.globalAlpha = 0.7;
    fCir(6, 20 + bob, 6, radGrad(6, 20 + bob, 0, 6, '#ff6050', 'rgba(255,80,60,0)'));
    fCir(34, 20 + bob, 6, radGrad(34, 20 + bob, 0, 6, '#ff6050', 'rgba(255,80,60,0)'));
    ctx.restore();
    // Nose
    fCir(20, 19 + bob, 1.5, '#b48c00');
    // Mouth
    ctx.strokeStyle = '#b48c00'; ctx.lineWidth = 1; ctx.beginPath();
    ctx.arc(20, 21 + bob, 4, 0.1, PI - 0.1); ctx.stroke();
    // Arms
    fEll(1, 22 + bob, 8, 12, '#d4aa00'); fEll(31, 22 + bob, 8, 12, '#d4aa00');
    // Feet
    fEll(7, 40 + bob, 11, 7, '#d4aa00'); fEll(22, 40 + bob, 11, 7, '#d4aa00');
    // Stripes on back
    ctx.save(); ctx.globalAlpha = 0.25;
    fRect(14, 28 + bob, 12, 3, '#8b6914'); fRect(12, 33 + bob, 16, 3, '#8b6914');
    ctx.restore();
  }

  _dFox(tick) {
    const bob = sin(this.runFrame) * 2;
    // Fluffy tail
    ctx.save(); ctx.translate(2, 4);
    fEll(-6, bob, 18, 30, linGrad(-6, bob, 12, 30 + bob, [[0, '#f5e0b8'], [1, '#b47828']]));
    ctx.restore();
    // Fluffy collar ruff
    fEll(4, 8 + bob, 32, 20, '#f5ebd8');
    for (let i = 0; i < 5; i++) {
      const ax = 6 + i * 6, ay = 6 + bob;
      fPoly([[ax, ay + 12], [ax + 3, ay + 4], [ax + 6, ay + 12]], '#f5ebd8');
    }
    // Body
    fEll(6, 14 + bob, 28, 28, linGrad(6, 14, 34, 42, [[0, '#c89050'], [0.5, '#b47828'], [1, '#8c5a1e']]));
    // Head
    fEll(6, 2 + bob, 28, 24, radGrad(20, 14 + bob, 2, 14, '#d8a864', '#b47828'));
    // Big fluffy ears
    fPoly([[4, 10 + bob], [-2, -12 + bob], [16, 4 + bob]], '#b47828');
    fPoly([[5, 6 + bob], [1, -6 + bob], [14, 4 + bob]], '#f0d8b4');
    fPoly([[24, 4 + bob], [42, -12 + bob], [36, 10 + bob]], '#b47828');
    fPoly([[26, 4 + bob], [39, -6 + bob], [35, 6 + bob]], '#f0d8b4');
    // Eyes (large round, shiny)
    fCir(13, 13 + bob, 5, '#2a1810'); fCir(27, 13 + bob, 5, '#2a1810');
    fCir(14.5, 11.5 + bob, 2.5, '#fff'); fCir(28.5, 11.5 + bob, 2.5, '#fff');
    // Nose + Mouth
    fCir(20, 17 + bob, 2, '#1e1410');
    dLine(20, 19 + bob, 17, 21 + bob, '#8c5a28', 1); dLine(20, 19 + bob, 23, 21 + bob, '#8c5a28', 1);
    // Feet
    fEll(7, 40 + bob, 10, 7, '#8c5a1e'); fEll(23, 40 + bob, 10, 7, '#8c5a1e');
  }

  _dEgg(tick) {
    const bob = sin(this.runFrame) * 1.5;
    // Egg shell (bottom) with zigzag
    fEll(4, 22 + bob, 32, 26, linGrad(4, 22, 36, 48, [[0, '#f5ead2'], [1, '#d8c8a0']]));
    sEll(4, 22 + bob, 32, 26, '#b49864', 2);
    for (let i = 0; i < 6; i++) {
      const zx = 5 + i * 5;
      fPoly([[zx, 24 + bob], [zx + 2.5, 18 + bob], [zx + 5, 24 + bob]], '#f5ead2');
    }
    // Body
    fEll(6, 6 + bob, 28, 26, radGrad(20, 18 + bob, 2, 16, '#fff', '#f5f0e8'));
    // Colored triangle decoration
    fPoly([[11, 16 + bob], [15, 9 + bob], [19, 16 + bob]], '#d83030');
    fPoly([[19, 16 + bob], [23, 9 + bob], [27, 16 + bob]], '#2860c8');
    fPoly([[15, 24 + bob], [19, 17 + bob], [23, 24 + bob]], '#d83030');
    // Crown spikes
    for (const sx of [14, 20, 26]) {
      fPoly([[sx - 3, 8 + bob], [sx, -4 + bob], [sx + 3, 8 + bob]], linGrad(sx - 3, -4, sx + 3, 8, [[0, '#e0c878'], [1, '#b49850']]));
    }
    // Eyes
    fCir(15, 14 + bob, 3.5, '#1a1a1a'); fCir(25, 14 + bob, 3.5, '#1a1a1a');
    fCir(16, 13 + bob, 1.5, '#fff'); fCir(26, 13 + bob, 1.5, '#fff');
    // Happy mouth
    ctx.strokeStyle = '#c87850'; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.arc(20, 18 + bob, 3, 0.1, PI - 0.1); ctx.stroke();
    // Small arms
    fEll(-1, 22 + bob, 9, 7, '#fff'); fEll(32, 22 + bob, 9, 7, '#fff');
  }

  _dBat(tick) {
    const bob = sin(this.runFrame) * 1.5;
    const wf = sin(Date.now() * 0.01) * 6;
    // Wings with membrane detail
    const wc = linGrad(-14, 0, 4, 24, [[0, 'rgba(80,40,120,0.7)'], [1, '#643c8c']]);
    fPoly([[6, 14 + bob], [-16, 2 + wf + bob], [-10, 24 + wf + bob], [6, 26 + bob]], wc);
    fPoly([[34, 14 + bob], [56, 2 + wf + bob], [50, 24 + wf + bob], [34, 26 + bob]], wc);
    // Wing vein lines
    ctx.globalAlpha = 0.3;
    dLine(4, 16 + bob, -12, 8 + wf + bob, '#a070d0', 1);
    dLine(4, 20 + bob, -8, 16 + wf + bob, '#a070d0', 1);
    dLine(36, 16 + bob, 52, 8 + wf + bob, '#a070d0', 1);
    dLine(36, 20 + bob, 48, 16 + wf + bob, '#a070d0', 1);
    ctx.globalAlpha = 1;
    // Body
    fEll(6, 10 + bob, 28, 32, linGrad(6, 10, 34, 42, [[0, '#9660c8'], [0.5, '#7848a8'], [1, '#5a3080']]));
    // Head
    fEll(8, 2 + bob, 24, 22, radGrad(20, 12 + bob, 2, 14, '#a070c8', '#7848a8'));
    // Big bat ears
    fPoly([[8, 8 + bob], [2, -14 + bob], [18, 6 + bob]], '#7848a8');
    fPoly([[10, 5 + bob], [6, -8 + bob], [16, 5 + bob]], '#c8a0e0');
    fPoly([[22, 6 + bob], [38, -14 + bob], [32, 8 + bob]], '#7848a8');
    fPoly([[24, 5 + bob], [34, -8 + bob], [30, 5 + bob]], '#c8a0e0');
    // Eyes (closed — it's blind)
    dLine(13, 12 + bob, 18, 12 + bob, '#2a1830', 2.5);
    dLine(22, 12 + bob, 27, 12 + bob, '#2a1830', 2.5);
    // Mouth with fangs
    fEll(16, 15 + bob, 10, 7, '#d05070');
    fPoly([[18, 15 + bob], [19, 20 + bob], [20, 15 + bob]], '#fff');
    fPoly([[21, 15 + bob], [22, 20 + bob], [23, 15 + bob]], '#fff');
    // Feet
    fEll(10, 40 + bob, 8, 6, '#5a3080'); fEll(22, 40 + bob, 8, 6, '#5a3080');
  }

  _drawThunder(cam, tick) {
    const ax = this.atkRect.x - cam, ay = this.atkRect.y;
    const prog = 1 - this.atkTimer / ATK_DUR;
    const f = this.facingRight ? 1 : -1;
    // Glow
    ctx.save();
    ctx.globalAlpha = 0.15 * (1 - prog);
    fRect(ax, ay, ATK_W, ATK_H, '#ffff40');
    ctx.restore();
    // Lightning bolts
    for (let i = 0; i < 6; i++) {
      let bx = ax + i * (ATK_W / 6), by = ay + random() * ATK_H;
      const pts = [[bx, by]];
      for (let j = 0; j < 4; j++) { bx += (6 + random() * 14) * f; by += -10 + random() * 20; pts.push([bx, by]); }
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]); ctx.stroke();
      ctx.strokeStyle = '#ffff40'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
      for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]); ctx.stroke();
    }
    // Spark particles
    if (this.atkTimer % 3 === 0) {
      emit(this.atkRect.cx, this.atkRect.cy, 2, 1, 3, 8, 2, '#ffff80', 0);
    }
  }

  _drawSchall(cam, tick) {
    const f = this.facingRight ? 1 : -1;
    const prog = 1 - this.atkTimer / ATK_DUR;
    const ox = this.rect.cx - cam + f * 10, oy = this.rect.cy;
    const colors = {
      fox: ['160,80,220', '200,140,255'],
      egg: ['70,120,210', '140,180,255'],
      bat: ['130,80,170', '180,120,220']
    }[this.form] || ['160,80,220', '200,140,255'];
    for (let i = 0; i < 5; i++) {
      const r = 18 + prog * 90 + i * 20;
      const a = max(0, (200 - i * 35 - prog * 100) / 255);
      if (a > 0) { sCir(ox, oy, r, `rgba(${colors[0]},${a})`, 3); }
    }
    // Center glow
    const gr = 6 + prog * 14;
    ctx.save(); ctx.globalAlpha = 0.5 * (1 - prog);
    fCir(ox, oy, gr, `rgba(${colors[1]},0.6)`);
    ctx.restore();
    if (this.atkTimer % 4 === 0) emit(ox + cam, oy, 2, 2, 2, 10, 2, `rgba(${colors[1]},0.7)`, 0);
  }
}

// ===== ENEMY =====
class Enemy {

  update() { if (!this.alive) return; this.rect.x += this.speed; if (this.rect.x <= this.lb || this.rect.r >= this.rb) this.speed *= -1; this.frame += 0.1; }
  draw(cam, tick) {
    if (!this.alive) return;
    const x = this.rect.x - cam, y = this.rect.y, w = 34;

// ===== WATER (V1-style) =====
class Water {
  constructor(x, w, yt) { this.rect = new Rect(x, yt, w, H - yt); this.x = x; this.w = w; this.yt = yt; }
  draw(cam, tick) {
    const x = this.x - cam;
    // Deep water
    fRect(x, this.yt, this.w, H - this.yt, '#0050b4');
    // Wave surface
    for (let wx = 0; wx < this.w; wx += 20) {
      const wy = this.yt + sin(tick * 0.08 + wx * 0.15) * 3;
      fEll(x + wx, wy - 4, 24, 8, '#50aaff');
    }
    // Surface strip
    fRect(x, this.yt, this.w, 12, '#1e78dc');
  }
}

// ===== LAVA =====
class Lava {
  constructor(x, w, yt) { this.rect = new Rect(x, yt, w, H - yt); this.x = x; this.w = w; this.yt = yt; }
  draw(cam, tick) {
    const x = this.x - cam;
    // Deep lava
    fRect(x, this.yt + 10, this.w, H - this.yt - 10, linGrad(x, this.yt, x, H, [[0, '#ff4500'], [0.4, '#cc3300'], [1, '#801a00']]));
    // Bubbles
    for (let bx = 0; bx < this.w; bx += 40) {
      const by = this.yt + 15 + sin(tick * 0.04 + bx * 0.1) * 8;
      const br = 3 + sin(tick * 0.06 + bx * 0.2) * 2;
      ctx.save(); ctx.globalAlpha = 0.5;
      fCir(x + bx + 10, by, br, '#ffcc00');
      ctx.restore();
    }
    // Surface shimmer
    for (let wx = 0; wx < this.w; wx += 14) {
      const wy = this.yt + sin(tick * 0.09 + wx * 0.13) * 4;
      ctx.save(); ctx.globalAlpha = 0.7;
      fEll(x + wx - 2, wy - 3, 18, 7, '#ff8c00');
      ctx.restore();
    }
    // Glow
    ctx.save(); ctx.globalAlpha = 0.15 + sin(tick * 0.05) * 0.05;
    fRect(x, this.yt - 20, this.w, 20, linGrad(x, this.yt - 20, x, this.yt, [[0, 'rgba(255,100,0,0)'], [1, 'rgba(255,100,0,0.3)']]));
    ctx.restore();
  }
}

// ===== COLLECTIBLE ITEM =====
class CollectItem {
  constructor(x, y, letter, hue, formName) {
    this.rect = new Rect(x, y, 28, 28); this.collected = false;
    this.letter = letter; this.hue = hue; this.formName = formName;
  }
  draw(cam, tick) {
    if (this.collected) return;
    const b = sin(tick * 0.05) * 5;
    const px = this.rect.x - cam + 14, py = this.rect.y + b + 14;
    // Orbiting sparkles
    for (let i = 0; i < 3; i++) {
      const a = tick * 0.04 + i * TAU / 3;
      const sx = px + cos(a) * 20, sy = py + sin(a) * 12;
      ctx.save(); ctx.globalAlpha = 0.4 + sin(tick * 0.1 + i) * 0.2;
      fCir(sx, sy, 2, `hsl(${this.hue},80%,70%)`);
      ctx.restore();
    }
    // Outer glow
    ctx.save(); ctx.globalAlpha = 0.25 + sin(tick * 0.06) * 0.1;
    fCir(px, py, 20, `hsl(${this.hue},60%,60%)`);
    ctx.restore();
    // Circle
    fCir(px, py, 15, `hsl(${this.hue},50%,35%)`);
    fCir(px, py, 12, radGrad(px - 3, py - 3, 1, 12, `hsl(${this.hue},60%,55%)`, `hsl(${this.hue},50%,30%)`));
    // Letter
    ctx.font = 'bold 18px "Segoe UI",sans-serif'; ctx.fillStyle = '#fff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(this.letter, px, py);
  }
}

// ===== DRAGON (flying platform) =====
class Dragon {
  constructor(x, y, lb, rb) {
    this.x = x; this.y = y; this.lb = lb; this.rb = rb;
    this.speed = 1.5; this.gw = 76; this.gh = 18;
    this.rect = new Rect(x, y, 76, 18);
  }
  update() { this.x += this.speed; if (this.x <= this.lb || this.x + this.gw >= this.rb) this.speed *= -1; this.rect.x = floor(this.x); this.rect.y = floor(this.y); }
  draw(cam, tick) {
    const x = floor(this.x) - cam, y = floor(this.y), f = this.speed >= 0 ? 1 : -1;
    const wf = sin(tick * 0.12) * 6;
    ctx.save();
    ctx.translate(x + this.gw / 2, y + this.gh / 2);
    ctx.scale(f, 1); ctx.translate(-this.gw / 2, -this.gh / 2);
    // Wings
    const wg = linGrad(-15, -18, 20, 0, [[0, '#80d0f0'], [1, '#50a0d0']]);
    fPoly([[-10 + 38, 4], [-15, -18 + wf], [5, -2]], wg);
    fPoly([[10 + 38, 4], [this.gw + 15, -18 + wf], [this.gw - 5, -2]], wg);
    // Body
    fEll(10, -6, 50, 28, linGrad(10, -6, 60, 22, [[0, '#f09030'], [0.5, '#e07020'], [1, '#c85818']]));
    // Belly
    fEll(20, 2, 30, 14, '#fad88c');
    // Head
    const hx = 56;
    fEll(hx - 10, -14, 24, 20, radGrad(hx + 2, -6, 2, 12, '#f09838', '#d87020'));
    fCir(hx + 6, -7, 4, '#fff'); fCir(hx + 7, -7, 2, '#1a1a1a');
    fEll(hx + 8, -6, 8, 5, '#dc8030');
    // Tail flame
    const ff = sin(tick * 0.2) * 3;
    fPoly([[-8, 6], [-22, -4 + ff], [-14, 10]], '#ff4010');
    fPoly([[-8, 6], [-16, 0 + ff], [-10, 8]], '#ffd020');
    // Inner wing detail
    ctx.globalAlpha = 0.15;
    dLine(30, 2, -8, -10 + wf, '#fff', 1); dLine(32, 0, -4, -14 + wf, '#fff', 1);
    ctx.globalAlpha = 1;
    // Continuous fire breath from mouth
    const flLen = 40 + sin(tick * 0.3) * 15;
    const flW = 8 + sin(tick * 0.25) * 3;
    const mx = hx + 14, my = -4;
    for (let i = 0; i < 5; i++) {
      const frac = i / 5;
      const fx = mx + frac * flLen + sin(tick * 0.4 + i) * 3;
      const fy = my + sin(tick * 0.3 + i * 0.8) * (3 + frac * 4);
      const fr = flW * (1 - frac * 0.5);
      ctx.globalAlpha = 0.7 - frac * 0.4;
      fCir(fx, fy, fr, i < 2 ? '#fff8a0' : (i < 4 ? '#ff6020' : '#ff3010'));
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ===== BOSS =====
class Boss {
  constructor(x, y, lb, rb, team) {
    this.rect = new Rect(x, y, 50, 60); this.lb = lb; this.rb = rb;
    this.speed = 1.2; this.alive = true; this.hp = 5; this.maxHp = 5;
    this.team = team; // 'bandit' or 'shadow'
    this.hitTimer = 0; this.frame = 0;
  }
  update() {
    if (!this.alive) return;
    this.rect.x += this.speed;
    if (this.rect.x <= this.lb || this.rect.r >= this.rb) this.speed *= -1;
    this.frame += 0.08;
    if (this.hitTimer > 0) this.hitTimer--;
  }
  hit() {
    if (this.hitTimer > 0) return false;
    this.hp--; this.hitTimer = 30;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }
  draw(cam, tick) {
    if (!this.alive) return;
    const x = this.rect.x - cam, y = this.rect.y, w = 50, h = 60;
    const f = this.speed >= 0 ? 1 : -1;
    // Flash when hit
    if (this.hitTimer > 0 && floor(this.hitTimer / 3) % 2 === 0) { ctx.globalAlpha = 0.4; }
    ctx.save();
    ctx.translate(x + w / 2, y + h); ctx.scale(f, 1); ctx.translate(-w / 2, -h);
    if (this.team === 'bandit') this._drawBandit(tick);
    else this._drawShadow(tick);
    ctx.restore();
    ctx.globalAlpha = 1;
    // HP bar
    if (this.alive) {
      const bw = 40, bh = 5;
      fRect(x + 5, y - 12, bw, bh, '#333');
      fRect(x + 5, y - 12, bw * (this.hp / this.maxHp), bh, this.team === 'bandit' ? '#e02020' : '#a040d0');
      fRect(x + 5, y - 12, bw, 1, 'rgba(255,255,255,0.3)');
    }
  }
  _drawBandit(tick) {
    // Bandit boss
    // Boots
    fRect(10, 52, 12, 8, '#1a1a1a'); fRect(28, 52, 12, 8, '#1a1a1a');
    // Legs
    fRect(14, 40, 8, 14, '#e8e8e8'); fRect(28, 40, 8, 14, '#e8e8e8');
    // Body (white uniform)
    fEll(8, 18, 34, 26, '#f0f0f0');
    // Red R on chest
    dText('B', 18, 25, 28, '#e02020', true, false, true);
    // Head
    fEll(12, 2, 26, 20, '#fdd8b0');
    // Hair
    fEll(12, -2, 26, 12, '#4040a0');
    // Eyes
    fCir(20, 12, 3, '#1a1a1a'); fCir(30, 12, 3, '#1a1a1a');
    fCir(20.5, 11.5, 1.2, '#fff'); fCir(30.5, 11.5, 1.2, '#fff');
    // Mean mouth
    dLine(20, 17, 30, 17, '#a05040', 1.5);
    // Gloves
    fEll(3, 30, 10, 8, '#1a1a1a'); fEll(37, 30, 10, 8, '#1a1a1a');
  }
  _drawShadow(tick) {
    // Shadow boss
    // Boots
    fRect(10, 52, 12, 8, '#2a2a2a'); fRect(28, 52, 12, 8, '#2a2a2a');
    // Legs (baggy pants)
    fRect(12, 38, 12, 16, '#303030'); fRect(26, 38, 12, 16, '#303030');
    // Body (black jacket)
    fEll(6, 16, 38, 26, '#1a1a1a');
    // Logo on chest
    fCir(25, 28, 8, '#e0e0e0');
    fCir(22, 26, 2, '#1a1a1a'); fCir(28, 26, 2, '#1a1a1a');
    dLine(22, 30, 28, 30, '#1a1a1a', 1);
    // Chain necklace
    for (let i = 0; i < 5; i++) sCir(16 + i * 4, 17, 2, '#c0c000', 1);
    // Head
    fEll(12, 0, 26, 20, '#e8c890');
    // Bandana
    fRect(12, 0, 26, 8, '#1a1a1a');
    fPoly([[12, 8], [8, 14], [12, 4]], '#1a1a1a');
    // Sunglasses
    fRect(14, 8, 10, 5, '#2a2a2a'); fRect(26, 8, 10, 5, '#2a2a2a');
    fRect(24, 9, 2, 3, '#404040');
    // Mouth (sneering)
    ctx.strokeStyle = '#805040'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(20, 16); ctx.quadraticCurveTo(25, 19, 30, 16); ctx.stroke();
    // Hands with brass knuckles
    fEll(1, 28, 10, 10, '#e8c890');
    fEll(39, 28, 10, 10, '#e8c890');
    for (let i = 0; i < 3; i++) { fCir(4 + i * 3, 28, 2, '#c0c000'); fCir(42 + i * 3, 28, 2, '#c0c000'); }
  }
}

// ===== FLAG =====
class Flag {
  constructor(x, y) { this.rect = new Rect(x, y - 70, 12, 70); this.x = x; this.y = y; }
  draw(cam, tick) {
    const x = this.x - cam;
    // Pole
    const pg = linGrad(x, this.y - 70, x + 6, this.y, [[0, '#e0e0e0'], [0.5, '#a0a0a0'], [1, '#606060']]);
    fRect(x, this.y - 70, 6, 70, pg);
    // Ball on top
    fCir(x + 3, this.y - 70, 4, '#ffd700');
    // Checkered flag (racing style)
    ctx.save();
    const wave = sin(tick * 0.06) * 3;
    const fW = 36, fH = 24, cols = 6, rows = 4;
    const cellW = fW / cols, cellH = fH / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx2 = x + 6 + c * cellW + wave * (c / cols);
        const cy2 = this.y - 68 + r * cellH + wave * 0.2 * (c / cols);
        fRect(cx2, cy2, cellW + 0.5, cellH + 0.5, (r + c) % 2 === 0 ? '#fff' : '#1a1a1a');
      }
    }
    ctx.restore();
  }
}

// ===== BACKGROUND LAYERS =====
class BgMountain {
  constructor(x, h, col) { this.x = x; this.h = h; this.col = col; this.w = 300 + random() * 200; }
}
let bgMtns1 = [], bgMtns2 = [], bgTrees = [];
function initBgElements() {
  bgMtns1 = []; bgMtns2 = []; bgTrees = [];
  for (let i = 0; i < 12; i++) bgMtns1.push(new BgMountain(i * 400 - 200, 140 + random() * 80, null));
  for (let i = 0; i < 16; i++) bgMtns2.push(new BgMountain(i * 300 - 200, 100 + random() * 60, null));
  for (let i = 0; i < 30; i++) bgTrees.push({ x: i * 200 + rnd(-40, 40), h: 40 + rnd(0, 30) });
}
initBgElements();

function drawBackground(cam, tick) {
  if (currentLevel === 2) {
    // Level 2: dark volcanic background
    const skyG = linGrad(0, 0, 0, H, [[0, '#1a0a0a'], [0.3, '#2a1010'], [0.55, '#4a1a10'], [0.75, '#6a2a14'], [1, '#802a10']]);
    fRect(0, 0, W, H, skyG);
    // Dim red sun
    ctx.save(); ctx.globalAlpha = 0.2; fCir(W * 0.8, 90, 45, '#ff3000'); ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.1; fCir(W * 0.8, 90, 70, '#ff2000'); ctx.restore();
    // Dark mountains
    ctx.save(); ctx.globalAlpha = 0.4;
    for (const m of bgMtns1) {
      const mx = m.x - cam * 0.05;
      fPoly([[mx, H - 50], [mx + m.w / 2, H - 50 - m.h], [mx + m.w, H - 50]], '#2a1010');
    }
    ctx.restore();
    ctx.save(); ctx.globalAlpha = 0.6;
    for (const m of bgMtns2) {
      const mx = m.x - cam * 0.12;
      fPoly([[mx, H - 50], [mx + m.w / 2, H - 50 - m.h], [mx + m.w, H - 50]], '#3a1810');
    }
    ctx.restore();
  } else {
  // Sky gradient
  const skyG = linGrad(0, 0, 0, H, [[0, '#1a2a5a'], [0.3, '#3a6ab0'], [0.55, '#70b8e8'], [0.75, '#b0dff8'], [1, '#d0f0ff']]);
  fRect(0, 0, W, H, skyG);

  // Sun
  const sunX = W * 0.82, sunY = 80;
  ctx.save(); ctx.globalAlpha = 0.15; fCir(sunX, sunY, 60, '#fff'); ctx.restore();
  ctx.save(); ctx.globalAlpha = 0.4; fCir(sunX, sunY, 35, '#fffae0'); ctx.restore();
  fCir(sunX, sunY, 22, '#fff8d0');

  // Far mountains (parallax 0.05)
  ctx.save(); ctx.globalAlpha = 0.3;
  for (const m of bgMtns1) {
    const mx = m.x - cam * 0.05;
    const g = linGrad(mx, H - m.h, mx + m.w / 2, H, [[0, '#4a6090'], [1, '#3a4a70']]);
    fPoly([[mx, H - 50], [mx + m.w / 2, H - 50 - m.h], [mx + m.w, H - 50]], g);
  }
  ctx.restore();

  // Mid mountains (parallax 0.12)
  ctx.save(); ctx.globalAlpha = 0.5;
  for (const m of bgMtns2) {
    const mx = m.x - cam * 0.12;
    const g = linGrad(mx, H - m.h - 40, mx + m.w / 2, H, [[0, '#5a8050'], [1, '#406038']]);
    fPoly([[mx, H - 50], [mx + m.w * 0.35, H - 50 - m.h * 0.8], [mx + m.w / 2, H - 50 - m.h], [mx + m.w * 0.7, H - 50 - m.h * 0.7], [mx + m.w, H - 50]], g);
  }
  ctx.restore();

  // Tree line (parallax 0.2)
  ctx.save(); ctx.globalAlpha = 0.4;
  for (const tr of bgTrees) {
    const tx = tr.x - cam * 0.2;
    const th = tr.h;
    fPoly([[tx, H - 50], [tx + 15, H - 50 - th], [tx + 30, H - 50]], '#2a5030');
    fPoly([[tx + 20, H - 50], [tx + 38, H - 50 - th * 0.8], [tx + 55, H - 50]], '#1e4028');
  }
  ctx.restore();
  } // end level check
}

// ===== PLATFORM DRAWING =====
function drawPlatform(p, cam, tick) {
  const x = p.x - cam, y = p.t, w = p.w, h = p.h;
  if (currentLevel === 2) {
    // Level 2: dark rocky platforms
    if (h >= 40) {
      const g = linGrad(x, y, x, y + h, [[0, '#4a3020'], [0.05, '#3a2518'], [0.15, '#2a1a10'], [0.5, '#201510'], [1, '#180e08']]);
      fRect(x, y, w, h, g);
      fRect(x, y, w, 3, '#5a4030');
      // Cracks
      for (let cx2 = x + 30; cx2 < x + w - 30; cx2 += 60) {
        ctx.save(); ctx.globalAlpha = 0.3;
        dLine(cx2, y, cx2 + 8, y + 12, '#1a0a00', 1);
        dLine(cx2 + 8, y + 12, cx2 + 3, y + 20, '#1a0a00', 1);
        ctx.restore();
      }
      // Ember glow at edges
      ctx.save(); ctx.globalAlpha = 0.1;
      fRect(x, y, w, 2, '#ff6020');
      ctx.restore();
    } else {
      fRRect(x, y, w, h, 3, linGrad(x, y, x, y + h, [[0, '#5a4030'], [0.3, '#4a3020'], [1, '#2a1810']]));
      fRect(x, y, w, 3, '#6a5040');
    }
  } else {
    // Level 1 platforms
    if (h >= 40) {
      // Ground with gradient
      const g = linGrad(x, y, x, y + h, [[0, '#4caf50'], [0.05, '#388e3c'], [0.15, '#795548'], [0.5, '#5d4037'], [1, '#3e2723']]);
      fRect(x, y, w, h, g);
      // Top grass strip
      fRect(x, y, w, 4, '#66bb6a');
      // Grass tufts
      for (let gx = x; gx < x + w; gx += 14) {
        const gh = 4 + sin(tick * 0.03 + gx * 0.1) * 2 + ((gx * 7 | 0) % 4);
        ctx.strokeStyle = '#43a047'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.quadraticCurveTo(gx - 2, y - gh, gx - 4, y - gh + 1); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(gx + 4, y); ctx.quadraticCurveTo(gx + 6, y - gh - 1, gx + 8, y - gh + 2); ctx.stroke();
      }
      // Occasional flowers (deterministic spacing)
      for (let fx = x + 20; fx < x + w - 20; fx += 80) {
        const fy = y - 3;
        const col = ['#ff7043', '#ffd54f', '#ab47bc', '#42a5f5'][floor(fx * 0.03) % 4];
        fCir(fx, fy, 3, col);
        fCir(fx, fy, 1.5, '#fff');
      }
      // Edge highlight
      fRect(x, y, w, 1, 'rgba(255,255,255,0.15)');
      // Edge shadow
      fRect(x, y + h - 2, w, 2, 'rgba(0,0,0,0.2)');
    } else {
      fRRect(x, y, w, h, 3, linGrad(x, y, x, y + h, [[0, '#a1887f'], [0.3, '#8d6e63'], [1, '#5d4037']]));
      fRect(x, y, w, 4, '#66bb6a');
      fRect(x, y, w, 1, 'rgba(255,255,255,0.2)');
    }
  }
}

// ===== HUD =====
function drawHUD(player, tick) {
  // Player name badge (top center)
  if (playerName) {
    const nameW = max(120, playerName.length * 10 + 30);
    ctx.save();
    ctx.globalAlpha = 0.75;
    fRRect(W / 2 - nameW / 2, 8, nameW, 32, 8, 'rgba(15,20,40,0.85)');
    ctx.restore();
    fRect(W / 2 - nameW / 2, 8, nameW, 1, 'rgba(255,255,255,0.08)');
    dText(playerName, 14, W / 2, 24, '#90caf9', true, false, true);
  }

  // Background bar (hearts + score)
  ctx.save();
  ctx.globalAlpha = 0.75;
  fRRect(8, 8, 280, 44, 10, 'rgba(15,20,40,0.85)');
  ctx.restore();
  fRect(8, 8, 280, 1, 'rgba(255,255,255,0.08)');

  // Hearts
  for (let i = 0; i < player.maxLives; i++) {
    const hx = 22 + i * 28, hy = 22;
    if (i < player.lives) {
      // Full heart
      ctx.fillStyle = '#ff3050'; ctx.beginPath();
      ctx.moveTo(hx, hy + 4); ctx.bezierCurveTo(hx, hy, hx - 8, hy - 2, hx - 8, hy + 4);
      ctx.bezierCurveTo(hx - 8, hy + 10, hx, hy + 14, hx, hy + 16);
      ctx.bezierCurveTo(hx, hy + 14, hx + 8, hy + 10, hx + 8, hy + 4);
      ctx.bezierCurveTo(hx + 8, hy - 2, hx, hy, hx, hy + 4);
      ctx.fill();
      // Highlight
      ctx.save(); ctx.globalAlpha = 0.4;
      fCir(hx - 3, hy + 3, 2.5, '#fff');
      ctx.restore();
    } else {
      // Empty heart
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5; ctx.beginPath();
      ctx.moveTo(hx, hy + 4); ctx.bezierCurveTo(hx, hy, hx - 8, hy - 2, hx - 8, hy + 4);
      ctx.bezierCurveTo(hx - 8, hy + 10, hx, hy + 14, hx, hy + 16);
      ctx.bezierCurveTo(hx, hy + 14, hx + 8, hy + 10, hx + 8, hy + 4);
      ctx.bezierCurveTo(hx + 8, hy - 2, hx, hy, hx, hy + 4);
      ctx.stroke();
    }
  }

  // Coin icon + score
  fCir(114, 30, 8, '#ffd700'); fCir(114, 30, 5, '#e8c200');
  dText('$', 9, 114, 30, '#8c6800', true, false, true);
  dText(player.score.toString(), 18, 128, 20, '#ffd700', false, true, true);

  // Form indicator
  const formColors = { hero: '#ffdc28', fox: '#b47828', egg: '#d23030', bat: '#7848a8' };
  const fc = formColors[player.form] || '#fff';
  fRRect(200, 14, 80, 30, 6, 'rgba(255,255,255,0.08)');
  fCir(216, 29, 8, fc);
  dText(player.form.charAt(0).toUpperCase() + player.form.slice(1), 13, 230, 22, '#ddd', false, false, true);

  // Level indicator
  fRRect(W / 2 + 80, 14, 50, 30, 6, 'rgba(255,255,255,0.08)');
  dText('L' + currentLevel, 14, W / 2 + 105, 29, currentLevel === 2 ? '#ff6030' : '#90caf9', true, false, true);

  // Attack cooldown
  if (player.atkCd > 0) {
    const pct = 1 - player.atkCd / ATK_CD;
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(W - 35, 35, 14, -PI / 2, -PI / 2 + TAU); ctx.stroke();
    ctx.strokeStyle = fc; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(W - 35, 35, 14, -PI / 2, -PI / 2 + pct * TAU); ctx.stroke();
    dText('F', 12, W - 35, 35, '#aaa', true, false, true);
  } else {
    ctx.save(); ctx.globalAlpha = 0.6 + sin(tick * 0.1) * 0.2;
    sCir(W - 35, 35, 14, fc, 2);
    dText('F', 12, W - 35, 35, '#fff', true, false, true);
    ctx.restore();
  }

  // Bat fly charges (X key)
  if (player.form === 'bat') {
    for (let i = 0; i < player.maxFlyCharges; i++) {
      const fx = W - 70 - i * 16, fy = 30;
      if (i < player.flyCharges) {
        fCir(fx, fy, 5, '#a070d0');
        ctx.save(); ctx.globalAlpha = 0.4; fCir(fx - 1, fy - 1, 2, '#fff'); ctx.restore();
      } else {
        sCir(fx, fy, 5, 'rgba(160,100,220,0.3)', 1);
      }
    }
    dText('X', 10, W - 70 - player.maxFlyCharges * 16 + 2, 24, '#a070d0', false, false, true);
  }
}

// ===== GAME STATE =====
let state = 'title', won = false, tick = 0;
let player, plats, enemies, coins, flag, clouds, waterZones, dragon, foxI, eggI, batI;

function startGame() {
  initAudio();

function loadLevel() {
  initBgElements();
  const lv = buildLevel();
  plats = lv.plats; enemies = lv.enemies; coins = lv.coins; flag = lv.flag; clouds = lv.clouds;
  waterZones = lv.water; dragon = lv.dragon; foxI = lv.foxI; eggI = lv.eggI; batI = lv.batI;

  player.rect.x = 50; player.rect.y = H - 130; player.vy = 0;
}

function nextLevel() {
  currentLevel = 2;
  const savedForm = player.form;
  const savedScore = player.score;
  const savedLives = player.lives;
  loadLevel();
  player.form = savedForm;
  player.score = savedScore;
  player.lives = savedLives;
}

function respawn() { player.rect.x = 50; player.rect.y = H - 130; player.vy = 0; player.invincible = 90; }

  ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 30 * glow;
  dText('ADVENTURE', 24, W / 2, 110, '#ffd700', true, true, true);
  dText('JUMP & RUN', 52, W / 2, 155, '#fff', true, true, true);
  ctx.shadowBlur = 0; ctx.restore();

  dText('V2 PRO EDITION', 14, W / 2, 195, 'rgba(255,215,0,0.6)', true, false, true);

  // Controls
  const controls = [
    ['Arrow Keys / WASD', 'Move'],
    ['Space / Up / W', 'Jump'],
    ['F', 'Attack (Lightning / Sonic Wave)'],
    ['X', 'Fly (Bat form only, 5 flaps)'],
    ['Stomp enemies', 'from above!'],
  ];
  let cy = 260;
  for (const [key, desc] of controls) {
    fRRect(W / 2 - 180, cy - 4, 360, 28, 6, 'rgba(255,255,255,0.05)');
    dText(key, 15, W / 2 - 10, cy + 10, '#90caf9', true, false, true);
    dText(desc, 13, W / 2 + 100, cy + 10, 'rgba(255,255,255,0.6)', false, false, false);
    cy += 34;
  }

  // CTA
  const cta = sin(titleAnim * 3) * 0.3 + 0.7;
  ctx.save(); ctx.globalAlpha = cta;
  const txt = 'Click to enter your name';
  dText(txt, 20, W / 2, H - 100, '#fff', true, true, true);
  ctx.restore();

  // Hero silhouette
  ctx.save(); ctx.globalAlpha = 0.15;
  fCir(140, H - 140, 50, '#ffd700');
  fCir(W - 140, H - 130, 45, '#ff5050');
  ctx.restore();
}

// ===== GAME OVER =====
function drawGameOver(tick) {
  fRect(0, 0, W, H, won ? linGrad(0, 0, 0, H, [[0, '#1a4020'], [1, '#0a2010']]) : linGrad(0, 0, 0, H, [[0, '#2a1020'], [1, '#100810']]));

  // Particles in background
  for (let i = 0; i < 20; i++) {
    const px = (i * 73 + tick * 0.5) % W, py = (i * 41 + sin(tick * 0.02 + i) * 30) % H;
    ctx.save(); ctx.globalAlpha = 0.1;
    fCir(px, py, 2 + sin(tick * 0.03 + i) * 1, won ? '#ffd700' : '#ff3030');
    ctx.restore();
  }

  const msg = won ? 'YOU WIN!' : 'GAME OVER';
  const col = won ? '#4caf50' : '#f44336';
  ctx.save();
  ctx.shadowColor = col; ctx.shadowBlur = 20;
  dText(msg, 56, W / 2, 200, col, true, true, true);
  ctx.shadowBlur = 0; ctx.restore();

  dText('Score: ' + player.score, 28, W / 2, 290, '#ffd700', true, true, true);
  if (playerName) dText(playerName, 16, W / 2, 330, 'rgba(255,255,255,0.5)', true, false, false);

  fRRect(W / 2 - 120, 360, 240, 44, 10, 'rgba(255,255,255,0.06)');
  dText('R = Restart    Q = Title', 18, W / 2, 382, '#999', true, false, false);

  if (won) {} // No sound on win
}

// ===== GAME UPDATE =====
function updateGame() {
  tick++;
  dragon.update();
  // Dragon carry: if player is on dragon, move player with it
  if (player.onGround && player.rect.b >= dragon.rect.t && player.rect.b <= dragon.rect.t + 8
      && player.rect.r > dragon.rect.l && player.rect.l < dragon.rect.r) {
    player.rect.x += dragon.speed;
  }
  const allP = plats.concat([dragon.rect]);
  player.update(allP);
  if (atkQueued) { player.attack(); atkQueued = false; }
  for (const e of enemies) e.update();

  // Enemy collision
  for (const e of enemies) {
    if (!e.alive) continue;
    if (player.atkRect && player.atkTimer > 0 && e.rect.hit(player.atkRect)) {
      e.alive = false; player.score += 100; sfxStomp(); stats.enemiesZapped++;
      emit(e.rect.cx, e.rect.cy, 15, 1, 3, 20, 3, '#ffd700', 0.05);
      shake(3, 6);
      continue;
    }
    if (player.rect.hit(e.rect)) {
      if (player.vy > 0 && player.rect.b - e.rect.t < 22) {
        e.alive = false; player.vy = JUMP_FORCE * 0.6; player.score += 100; sfxStomp(); stats.enemiesStomped++;
        emit(e.rect.cx, e.rect.cy, 12, 1, 2.5, 18, 3, '#ffd700', 0.05);
      } else if (player.invincible <= 0) {
        player.lives--; sfxHit(); shake(5, 12); stats.deaths++; stats.enemyDeaths++;
        emit(player.rect.cx, player.rect.cy, 10, 1, 2, 15, 3, '#ff4040', 0.03);
        if (player.lives <= 0) { state = 'gameover'; won = false; stats.finalize(player, false); stats.publish(); return; }
        respawn();
      }
    }
  }

  // Coins
  for (const c of coins) if (!c.collected && player.rect.hit(c.rect)) {
    c.collected = true; player.score += 50; sfxCoin(); stats.coinsCollected++;
    emit(c.rect.cx, c.rect.cy, 8, 0.8, 2, 15, 2, '#ffd700', -0.02);
  }

  // Items
  for (const item of [foxI, eggI, batI]) {
    if (!item.collected && player.rect.hit(item.rect)) {
      item.collected = true; player.form = item.formName; player.score += 200; sfxItem();
      stats.formsCollected.push(item.formName);
      emit(item.rect.cx, item.rect.cy, 20, 1.5, 3, 25, 3, `hsl(${item.hue},70%,60%)`, -0.02);
      shake(4, 10);
    }
  }

  // Boss collision
  if (boss && boss.alive) {
    boss.update();
    if (player.atkRect && player.atkTimer > 0 && boss.rect.hit(player.atkRect)) {
      const killed = boss.hit();
      if (killed) {
        player.score += 500; sfxStomp(); stats.bossesKilled++;
        emit(boss.rect.cx, boss.rect.cy, 25, 1.5, 4, 25, 4, '#ffd700', 0.05);
        shake(6, 15);
      } else {
        sfxStomp(); shake(3, 6);
        emit(boss.rect.cx, boss.rect.cy, 8, 1, 2, 12, 2, '#ff4040', 0.03);
      }
    }
    if (player.rect.hit(boss.rect)) {
      if (player.vy > 0 && player.rect.b - boss.rect.t < 22) {
        const killed = boss.hit();
        player.vy = JUMP_FORCE * 0.6;
        if (killed) {
          player.score += 500; sfxStomp(); stats.bossesKilled++;
          emit(boss.rect.cx, boss.rect.cy, 25, 1.5, 4, 25, 4, '#ffd700', 0.05);
          shake(6, 15);
        } else {
          sfxStomp(); shake(3, 6);
        }
      } else if (player.invincible <= 0) {
        player.lives--; sfxHit(); shake(5, 12); stats.deaths++; stats.enemyDeaths++;
        emit(player.rect.cx, player.rect.cy, 10, 1, 2, 15, 3, '#ff4040', 0.03);
        if (player.lives <= 0) { state = 'gameover'; won = false; stats.finalize(player, false); stats.publish(); return; }
        respawn();
      }
    }
  }

  // Lava zones
  for (const lv of lavaZones) if (player.rect.hit(lv.rect)) {
    if (player.invincible <= 0) {
      player.lives--; sfxHit(); shake(4, 10); stats.deaths++; stats.lavaDeaths++;
      emit(player.rect.cx, lv.yt, 12, 1, 3, 18, 3, '#ff6020', -0.08);
      if (player.lives <= 0) { state = 'gameover'; won = false; stats.finalize(player, false); stats.publish(); return; }
      respawn();
    }
    break;
  }

  // Water
  for (const w of waterZones) if (player.rect.hit(w.rect)) {
    if (player.invincible <= 0) {
      player.lives--; sfxHit(); shake(4, 10); stats.deaths++; stats.waterDeaths++;
      emit(player.rect.cx, w.yt, 10, 1, 3, 15, 3, '#60b8ff', -0.08);
      if (player.lives <= 0) { state = 'gameover'; won = false; stats.finalize(player, false); stats.publish(); return; }
      respawn();
    }
    break;
  }

  // Fall
  if (player.rect.t > H + 100) {
    player.lives--; sfxHit(); stats.deaths++; stats.fallDeaths++;
    if (player.lives <= 0) { state = 'gameover'; won = false; stats.finalize(player, false); stats.publish(); return; }
    respawn();
  }

  // Flag — advance to Level 2 or win
  if (player.rect.hit(flag.rect)) {
    if (currentLevel === 1 && (!boss || !boss.alive)) {
      nextLevel();
      return;
    } else if (currentLevel === 2 && (!boss || !boss.alive)) {
      state = 'gameover'; won = true; stats.finalize(player, true); stats.publish();
    }
    // If boss is still alive, can't finish the level
  }

  // Track max distance
  stats.maxXReached = Math.max(stats.maxXReached, player.rect.x);

  // Camera with lerp
  targetCamX = player.rect.cx - W / 3;
  targetCamX = max(0, targetCamX);
  camX = lerp(camX, targetCamX, CAM_LERP);

  // Particles update
  for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); if (particles[i].dead) particles.splice(i, 1); }

  // Shake
  if (shakeT > 0) { shakeT--; } else { shakeX = 0; shakeY = 0; }
}

// ===== GAME DRAW =====
function drawGame() {
  // Apply screen shake
  ctx.save();
  if (shakeT > 0) ctx.translate((random() - 0.5) * shakeX * 2, (random() - 0.5) * shakeY * 2);

  drawBackground(camX, tick);
  for (const c of clouds) c.draw(camX);
  for (const p of plats) drawPlatform(p, camX, tick);
  for (const w of waterZones) w.draw(camX, tick);
  for (const lv of lavaZones) lv.draw(camX, tick);
  dragon.draw(camX, tick);
  foxI.draw(camX, tick); eggI.draw(camX, tick); batI.draw(camX, tick);
  for (const c of coins) c.draw(camX, tick);
  for (const e of enemies) e.draw(camX, tick);
  if (boss && boss.alive) boss.draw(camX, tick);
  flag.draw(camX, tick);

  // Particles behind player
  for (const p of particles) p.draw(camX);

  player.draw(camX, tick);

  ctx.restore(); // end shake

  drawHUD(player, tick);
}

// ===== MAIN LOOP =====
let winSfxPlayed = false;
function loop() {
  if (state === 'title') {
    titleAnim += 0.016;
    drawTitle(titleAnim * 60);
    if (anyKey && playerName) { startGame(); anyKey = false; winSfxPlayed = false; }
    else if (anyKey && !playerName) {
      cv.style.display = 'none';
      nameContainer.style.display = 'block';
      nameInput.value = '';
      nameInput.focus();
      anyKey = false;
    }
  } else if (state === 'playing') {
    updateGame();
    if (state === 'playing') drawGame();
    else { drawGameOver(tick); winSfxPlayed = won; }
  } else if (state === 'gameover') {
    drawGameOver(tick);
    tick++;
    if (keys.KeyR) { startGame(); anyKey = false; winSfxPlayed = false; }
    if (keys.KeyQ) { state = 'title'; anyKey = false; }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
